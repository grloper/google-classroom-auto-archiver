<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCHIVE // Classroom Downloader</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syncopate', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            dark: '#050505',
            panel: '#0f0f0f',
            accent: '#FF5500',
            success: '#00FF66',
            muted: '#333333',
            textmain: '#E0E0E0',
            textmuted: '#888888',
          },
          animation: {
            'glitch': 'glitch 0.2s linear infinite',
            'blink': 'blink 1s step-end infinite',
          },
          keyframes: {
            glitch: {
              '0%': { transform: 'translate(0)' },
              '20%': { transform: 'translate(-2px, 2px)' },
              '40%': { transform: 'translate(-2px, -2px)' },
              '60%': { transform: 'translate(2px, 2px)' },
              '80%': { transform: 'translate(2px, -2px)' },
              '100%': { transform: 'translate(0)' }
            },
            blink: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0' },
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Load Canvas Background Animation -->
  <script src="/canvas.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body { 
      background-color: #050505; 
      color: #E0E0E0; 
      margin: 0; 
      overflow: hidden; 
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #050505; border-left: 1px solid #333; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: #FF5500; }

    /* Industrial/Brutalist Utilities */
    .brutal-panel {
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid #333;
    }
    
    .brutal-header {
      background: rgba(5, 5, 5, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #333;
    }
    
    .brutal-btn {
      background: transparent;
      border: 1px solid #FF5500;
      color: #FF5500;
      transition: all 0.15s ease;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .brutal-btn:hover:not(:disabled) {
      background: #FF5500;
      color: #050505;
      box-shadow: 4px 4px 0px 0px rgba(255,85,0,0.4);
      transform: translate(-2px, -2px);
    }
    .brutal-btn:active:not(:disabled) {
      transform: translate(0px, 0px);
      box-shadow: none;
    }
    .brutal-btn.success {
      border-color: #00FF66;
      color: #00FF66;
    }
    .brutal-btn.success:hover:not(:disabled) {
      background: #00FF66;
      color: #050505;
      box-shadow: 4px 4px 0px 0px rgba(0,255,102,0.4);
    }
    .brutal-btn.danger {
      border-color: #FF0033;
      color: #FF0033;
    }
    .brutal-btn.danger:hover:not(:disabled) {
      background: #FF0033;
      color: #050505;
      box-shadow: 4px 4px 0px 0px rgba(255,0,51,0.4);
    }
    .brutal-btn.secondary {
      border-color: #E0E0E0;
      color: #E0E0E0;
    }
    .brutal-btn.secondary:hover:not(:disabled) {
      background: #E0E0E0;
      color: #050505;
      box-shadow: 4px 4px 0px 0px rgba(224,224,224,0.4);
    }

    .brutal-select {
      background: #050505;
      color: #E0E0E0;
      border: 1px solid #333;
      outline: none;
      appearance: none;
      cursor: pointer;
    }
    .brutal-select:focus {
      border-color: #FF5500;
    }

    .noise-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 50;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    
    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 85, 0, 0.3);
      opacity: 0.5;
      animation: scan 8s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0% { top: -5%; }
      100% { top: 105%; }
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <canvas id="bg-canvas"></canvas>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function Icon({ name, className = "" }) {
      const svgRef = React.useRef(null);
      
      useEffect(() => {
        if (svgRef.current && window.lucide) {
          window.lucide.createIcons({
            icons: { [name]: window.lucide.icons[name] },
            attrs: { class: className },
            nameAttr: 'data-lucide'
          });
        }
      }, [name, className]);

      return <i ref={svgRef} data-lucide={name}></i>;
    }

    function bytesToSize(bytes) {
      if (!bytes) return 'UNKNOWN';
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      if (bytes === 0) return '0 B';
      const i = parseInt(Math.floor(Math.log(bytes) / Math.log(1024)));
      return Math.round(bytes / Math.pow(1024, i), 2) + ' ' + sizes[i];
    }

    const API_BASE = window.location.origin;

    function App() {
      const [apiStatus, setApiStatus] = useState({ online: false, counts: null });
      const [plan, setPlan] = useState(null);
      const [selection, setSelection] = useState(null);
      const [dbFiles, setDbFiles] = useState([]);
      const [coursesData, setCoursesData] = useState(null);
      const [selectedCourseId, setSelectedCourseId] = useState(null);
      const [activeTab, setActiveTab] = useState('classroom');
      const [loading, setLoading] = useState(true);

      const refreshData = async (silent = false) => {
        if (!silent) setLoading(true);
        try {
          const [resHealth, resPlan, resSel, resFiles, resCourses] = await Promise.all([
            fetch(`${API_BASE}/health`).catch(() => ({ ok: false })),
            fetch(`${API_BASE}/plan`).catch(() => ({ ok: false })),
            fetch(`${API_BASE}/selection`).catch(() => ({ ok: false })),
            fetch(`${API_BASE}/db/files`).catch(() => ({ ok: false })),
            fetch(`${API_BASE}/courses`).catch(() => ({ ok: false }))
          ]);

          if (resHealth.ok) {
            const data = await resHealth.json();
            setApiStatus({ online: true, counts: data.counts });
          } else {
            setApiStatus({ online: false, counts: null });
          }
          
          if (resPlan.ok) setPlan(await resPlan.json());
          if (resSel.ok) setSelection(await resSel.json() || { selection_mode: 'implicit', excluded_attachment_ids: [] });
          if (resFiles.ok) setDbFiles(await resFiles.json() || []);
          if (resCourses.ok) setCoursesData(await resCourses.json());
        } catch (e) {
          setApiStatus({ online: false, counts: null });
          console.error("SYS.ERR: API OFFLINE", e);
        }
        if (!silent) setLoading(false);
      };

      useEffect(() => {
        refreshData();
        const poller = setInterval(() => {
          refreshData(true);
        }, 3000);
        return () => clearInterval(poller);
      }, []);

      useEffect(() => {
        if (coursesData?.courses?.length > 0 && !selectedCourseId) {
          setSelectedCourseId(coursesData.courses[0].id);
        }
      }, [coursesData, selectedCourseId]);

      const getStats = useMemo(() => {
        if (!plan) return { courses: 0, items: 0, bytes: 0 };
        let items = 0, bytes = 0;
        plan.courses?.forEach(c => {
          c.topics?.forEach(t => {
            t.materials?.forEach(m => {
              m.attachments?.forEach(a => {
                items++;
                bytes += (a.size_bytes || 0);
              });
            });
          });
        });
        return { courses: plan.courses?.length || 0, items, bytes };
      }, [plan]);

      const handleTriggerRefreshPlan = async () => {
        await fetch(`${API_BASE}/plan/refresh`, { method: 'POST' });
        alert('CMD: SYNC_CLASSROOM_DATA DISPATCHED. MONITOR TERMINAL.');
      };

      const handleSaveSelection = async (btnId) => {
        if (!selection) return;

        const excludedCount = selection.excluded_attachment_ids?.length || 0;
        const totalCount = getStats.items;
        const includedCount = totalCount - excludedCount;

        const confirmed = window.confirm(
          `[ CONFIRM ACTION: SAVE_PLAN ]\n\n` +
          `+ INCLUDED : ${includedCount}\n` +
          `- EXCLUDED : ${excludedCount}\n\n` +
          `PROCEED?`
        );

        if (!confirmed) return;

        const payloadToSave = { ...selection, selection_mode: 'implicit' };

        await fetch(`${API_BASE}/selection`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payloadToSave)
        });
        
        const btn = document.getElementById(btnId);
        if(!btn) return;
        const origText = btn.innerHTML;
        btn.innerHTML = `[ <i data-lucide="check" class="w-4 h-4"></i> SAVED ]`;
        btn.classList.add('success');
        if (window.lucide) window.lucide.createIcons();
        
        setTimeout(() => {
          btn.innerHTML = origText;
          btn.classList.remove('success');
          if (window.lucide) window.lucide.createIcons();
        }, 2000);
      };

      const handleStartDownload = async () => {
        await fetch(`${API_BASE}/downloads/selected`, { method: 'POST' });
        alert('CMD: START_DOWNLOAD DISPATCHED. MONITOR TERMINAL.');
      };

      const handleResetDatabase = async () => {
        const confirmed = window.confirm(
          '[ WARNING: DESTRUCTIVE ACTION ]\n\n' +
          'THIS WILL PURGE THE LOCAL METADATA DATABASE.\n' +
          'FILES ON DISK WILL REMAIN, BUT INDEX WILL BE LOST.\n\n' +
          'EXECUTE PURGE?'
        );
        if (!confirmed) return;
        
        try {
          const res = await fetch(`${API_BASE}/db/reset`, { method: 'DELETE' });
          if (res.ok) {
            alert('SYS.MSG: DB PURGE COMPLETE.');
            refreshData(); 
          } else {
            alert('SYS.ERR: PURGE FAILED.');
          }
        } catch (e) {
          console.error(e);
          alert('SYS.ERR: COMMS FAILURE.');
        }
      };

      if (loading && !plan) {
        return (
          <div className="flex h-screen items-center justify-center relative z-10">
            <div className="flex flex-col items-center gap-6">
              <div className="text-accent animate-pulse">
                <Icon name="cpu" className="w-16 h-16" />
              </div>
              <span className="text-2xl font-display tracking-widest text-textmain">INITIALIZING_</span>
              <span className="text-xs text-textmuted font-mono animate-blink">PLEASE WAIT</span>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen flex-col overflow-hidden relative z-10 font-mono text-sm">
          {/* Header */}
          <header className="flex h-16 shrink-0 items-center justify-between px-6 brutal-header z-20">
            <div className="flex items-center gap-4">
              <div className="flex h-10 w-10 items-center justify-center border border-accent text-accent">
                <Icon name="database" className="h-5 w-5" />
              </div>
              <h1 className="text-xl font-display font-bold tracking-widest text-textmain flex items-center gap-3">
                CLASSROOM_ARCHIVE
                <span className="text-[10px] bg-accent text-dark px-2 py-0.5 font-bold font-mono tracking-normal hidden sm:inline-block">V1.0.0</span>
              </h1>
            </div>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-3 border border-muted px-4 py-1.5 text-xs font-bold bg-dark">
                <span className="text-textmuted">SYS.STATUS:</span>
                <span className={`flex items-center gap-2 ${apiStatus.online ? 'text-success' : 'text-red-500'}`}>
                  <span className={`h-2 w-2 ${apiStatus.online ? 'bg-success shadow-[0_0_8px_#00FF66]' : 'bg-red-500 animate-pulse'}`}></span>
                  {apiStatus.online ? 'ONLINE' : 'OFFLINE'}
                </span>
              </div>
            </div>
          </header>

          <main className="flex flex-1 overflow-hidden">
            {/* Sidebar */}
            <aside className="w-64 p-6 flex flex-col gap-4 brutal-panel z-10 border-t-0 border-b-0 border-l-0">
              <div className="text-[10px] font-bold text-textmuted border-b border-muted pb-2 mb-2 flex items-center justify-between">
                <span>[ NAVIGATION_BUS ]</span>
                <Icon name="terminal" className="w-3 h-3" />
              </div>
              {[
                { id: 'classroom', icon: 'server', label: 'THE_ARCHIVE' },
                { id: 'overview', icon: 'activity', label: 'TELEMETRY' },
                { id: 'courses', icon: 'git-merge', label: 'DL_PLAN' },
                { id: 'settings', icon: 'settings', label: 'CONFIG' }
              ].map(tab => (
                <div 
                  key={tab.id}
                  className={`cursor-pointer px-4 py-3 font-bold flex gap-4 items-center transition-all duration-150 border-l-2 ${activeTab === tab.id ? 'bg-[#1a1a1a] text-accent border-accent' : 'text-textmuted border-transparent hover:border-textmain hover:text-textmain'}`}
                  onClick={() => setActiveTab(tab.id)}
                >
                  <Icon name={tab.icon} className={`w-4 h-4`} /> 
                  <span className="tracking-widest">{tab.label}</span>
                  {activeTab === tab.id && <span className="ml-auto text-[10px] animate-blink text-accent">_</span>}
                </div>
              ))}
              
              <div className="mt-auto border-t border-muted pt-4 text-[10px] text-textmuted flex flex-col gap-1 opacity-50 hover:opacity-100 transition-opacity">
                 <div>UID: 0x{Math.random().toString(16).slice(2, 8).toUpperCase()}</div>
                 <div>MEM: {(performance?.memory?.usedJSHeapSize / 1048576).toFixed(2) || '0.00'} MB</div>
                 <div>ENV: PROD</div>
              </div>
            </aside>

            {/* Main Content Area */}
            <section className="flex-1 overflow-y-auto p-8 relative">
              <div className="scanline"></div>
              <div className="max-w-6xl mx-auto space-y-8 pb-20">
                
                {/* ----------------- CLASSROOM / ARCHIVE TAB ----------------- */}
                {activeTab === 'classroom' && coursesData && (
                  <div className="flex flex-col gap-8 animate-in fade-in duration-300">
                    <div className="flex flex-col md:flex-row md:items-center justify-between brutal-panel p-6 border-muted gap-4">
                      <div>
                        <h2 className="text-2xl font-display font-bold text-textmain tracking-widest flex items-center gap-3">
                          <Icon name="database" className="w-6 h-6 text-accent"/> THE_ARCHIVE
                        </h2>
                        <p className="text-xs text-textmuted mt-2 border-l-2 border-muted pl-3">Access terminal for localized course materials.</p>
                      </div>
                      <div className="relative">
                        <select 
                          className="brutal-select pl-4 pr-10 py-3 text-sm font-bold w-full md:w-64"
                          value={selectedCourseId || ''}
                          onChange={(e) => setSelectedCourseId(e.target.value)}
                        >
                          <option value="" disabled>[ SELECT_SOURCE ]</option>
                          {coursesData.courses?.map(c => (
                            <option key={c.id} value={c.id}>{c.name}</option>
                          ))}
                        </select>
                        <Icon name="chevron-down" className="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-accent pointer-events-none" />
                      </div>
                    </div>

                    <div className="flex flex-col gap-10">
                      {coursesData.courses?.filter(c => c.id === selectedCourseId).map(course => (
                        <div key={course.id} className="flex flex-col gap-8">
                          {/* Course Header Banner */}
                          <div className="brutal-panel border-accent p-8 relative overflow-hidden group">
                            <div className="absolute top-0 left-0 w-2 h-full bg-accent"></div>
                            <div className="absolute top-0 right-0 w-32 h-32 opacity-5 pointer-events-none">
                               <Icon name="cpu" className="w-full h-full" />
                            </div>
                            <div className="pl-6">
                              <div className="text-[10px] text-accent mb-2 font-bold tracking-widest">[ COURSE_OBJ: {course.id} ]</div>
                              <h1 className="text-4xl font-display font-bold mb-4 tracking-tight text-textmain uppercase">{course.name}</h1>
                              <div className="flex flex-wrap gap-4 text-xs font-bold">
                                <span className="border border-muted px-3 py-1 flex items-center gap-2 bg-dark">
                                  <Icon name="user" className="w-3 h-3 text-textmuted"/> <span className="text-textmuted">INSTR:</span> {course.teacher}
                                </span>
                                {course.section && (
                                  <span className="border border-muted px-3 py-1 flex items-center gap-2 bg-dark">
                                    <Icon name="hash" className="w-3 h-3 text-textmuted"/> <span className="text-textmuted">SECT:</span> {course.section}
                                  </span>
                                )}
                              </div>
                            </div>
                          </div>

                          {/* Topics */}
                          <div className="flex flex-col gap-10">
                            {course.topics?.map(topic => (
                              <div key={topic.id} className="flex flex-col gap-4">
                                <h2 className="text-lg font-bold text-textmain flex items-center gap-3 border-b border-muted pb-2">
                                  <Icon name="folder-tree" className="w-5 h-5 text-accent"/>
                                  {topic.title || 'ROOT_DIR'}
                                </h2>
                                
                                <div className="grid grid-cols-1 gap-4 pl-0 sm:pl-4 border-l border-muted/30">
                                  {topic.materials?.map(mat => {
                                    const mType = mat.type ? mat.type.toLowerCase() : 'other';
                                    const isAssignment = mType === 'assignment';
                                    const bColor = isAssignment ? 'border-accent' : 'border-success';
                                    const tColor = isAssignment ? 'text-accent' : 'text-success';

                                    return (
                                      <div key={mat.id} className={`brutal-panel border-l-4 ${bColor} p-5 flex flex-col gap-4 hover:bg-[#111] transition-colors`}>
                                        
                                        {/* Material Header */}
                                        <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
                                          <div className="flex gap-4 items-start">
                                            <div className={`mt-1 p-2 border ${bColor} ${tColor} bg-dark`}>
                                              <Icon name={isAssignment ? 'terminal-square' : 'book-open'} className="w-5 h-5"/>
                                            </div>
                                            <div>
                                              <h3 className="font-bold text-base text-textmain tracking-wide">{mat.title}</h3>
                                              <div className="flex flex-wrap gap-3 items-center mt-2">
                                                <span className={`text-[10px] font-bold px-2 py-0.5 border ${bColor} ${tColor}`}>{mType.toUpperCase()}</span>
                                                {mat.due_date && <span className="text-[10px] font-bold text-red-500 border border-red-500/50 px-2 py-0.5 flex items-center gap-1.5 bg-red-500/10">DUE: {mat.due_date}</span>}
                                              </div>
                                            </div>
                                          </div>
                                        </div>
                                        
                                        {mat.description && (
                                          <div className="text-xs text-textmuted whitespace-pre-wrap bg-dark p-4 border border-muted leading-relaxed font-mono overflow-x-auto">
                                            {mat.description}
                                          </div>
                                        )}
                                        
                                        {/* Attachments */}
                                        {mat.attachments?.length > 0 && (
                                          <div className="mt-2 flex flex-col gap-2">
                                            <div className="text-[10px] text-textmuted mb-1">[ ATTACHED_PAYLOADS ]</div>
                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-2">
                                              {mat.attachments.map(att => {
                                                const isDownloaded = att.status === 'complete' && att.local_path;
                                                return (
                                                  <div key={att.id} className={`flex items-center gap-3 p-2 border transition-all ${isDownloaded ? 'border-muted bg-[#141414] hover:border-textmain cursor-pointer' : 'border-dashed border-muted/50 bg-transparent opacity-60'} `}
                                                    onClick={() => {
                                                      if (isDownloaded) {
                                                        fetch(`${API_BASE}/open`, {
                                                          method: 'POST',
                                                          headers: { 'Content-Type': 'application/json' },
                                                          body: JSON.stringify({ id: att.id })
                                                        }).catch(err => alert('SYS.ERR: EXEC FAILURE.'));
                                                      }
                                                    }}
                                                  >
                                                    <div className={`p-1.5 border ${isDownloaded ? 'border-muted text-textmain bg-dark' : 'border-transparent text-textmuted'}`}>
                                                      <Icon name={att.provider === 'youtube' ? 'youtube' : att.provider === 'form' ? 'form-input' : 'file-code'} className="h-4 w-4" />
                                                    </div>
                                                    <div className="flex-1 min-w-0 flex flex-col">
                                                      <span className={`truncate text-xs font-bold ${isDownloaded ? 'text-textmain' : 'text-textmuted'}`} title={att.filename}>{att.filename}</span>
                                                      <span className={`text-[9px] mt-0.5 font-bold ${isDownloaded ? 'text-success' : 'text-textmuted'}`}>
                                                        {isDownloaded ? '> READY. CLICK TO EXECUTE.' : '> STATUS: PENDING DL'}
                                                      </span>
                                                    </div>
                                                    {isDownloaded && <Icon name="arrow-up-right" className="w-3 h-3 text-textmuted mr-2"/>}
                                                  </div>
                                                );
                                              })}
                                            </div>
                                          </div>
                                        )}
                                      </div>
                                    );
                                  })}
                                  {(!topic.materials || topic.materials.length === 0) && (
                                    <div className="text-xs text-textmuted border border-dashed border-muted p-4 text-center">
                                      [ EMPTY_DIR ]
                                    </div>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* ----------------- TELEMETRY / OVERVIEW TAB ----------------- */}
                {activeTab === 'overview' && (
                  <div className="flex flex-col gap-6 animate-in fade-in duration-300">
                    <div className="brutal-panel p-8">
                      <div className="flex items-center gap-4 mb-6 border-b border-muted pb-4">
                        <Icon name="activity" className="w-6 h-6 text-accent"/>
                        <h2 className="text-2xl font-display font-bold text-textmain tracking-widest">SYSTEM_TELEMETRY</h2>
                      </div>
                      <div className="text-xs text-textmuted mb-8 leading-relaxed max-w-3xl border-l-2 border-accent pl-4">
                        > INITIALIZING DASHBOARD UI...<br/>
                        > CONNECTION ESTABLISHED.<br/>
                        > PARSING METADATA FROM LOCAL DB.<br/>
                        > SYSTEM IS READY.
                      </div>
                      
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {[
                          { label: 'IDX_COURSES', value: getStats.courses, icon: 'database' },
                          { label: 'TOTAL_NODES', value: getStats.items, icon: 'network' },
                          { label: 'EST_PAYLOAD', value: bytesToSize(getStats.bytes), icon: 'hard-drive' }
                        ].map((stat, i) => (
                          <div key={i} className="border border-muted p-6 bg-dark hover:border-textmain transition-colors group relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-2 opacity-10 group-hover:opacity-20 transition-opacity"><Icon name={stat.icon} className="w-16 h-16"/></div>
                            <div className="text-[10px] font-bold text-textmuted mb-2 tracking-widest">[ {stat.label} ]</div>
                            <div className="text-4xl font-display font-bold text-textmain">{stat.value}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <div className="brutal-panel p-8">
                      <div className="flex items-center gap-4 mb-6 border-b border-muted pb-4">
                        <Icon name="terminal" className="w-6 h-6 text-success"/>
                        <h3 className="text-2xl font-display font-bold text-textmain tracking-widest">EXECUTE_COMMANDS</h3>
                      </div>
                      <div className="flex flex-wrap gap-4">
                        <button onClick={handleTriggerRefreshPlan} className="brutal-btn px-6 py-3 secondary">
                          <Icon name="refresh-cw" className="w-4 h-4"/> [ SYNC_METADATA ]
                        </button>
                        <button id="save-btn-overview" onClick={() => handleSaveSelection('save-btn-overview')} className="brutal-btn px-6 py-3">
                          <Icon name="save" className="w-4 h-4"/> [ COMMIT_PLAN ]
                        </button>
                        <button onClick={handleStartDownload} className="brutal-btn px-6 py-3 success">
                          <Icon name="download" className="w-4 h-4"/> [ INIT_DOWNLOAD ]
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* ----------------- DL_PLAN / COURSES TAB ----------------- */}
                {activeTab === 'courses' && plan && (
                  <div className="flex flex-col gap-6 animate-in fade-in duration-300">
                    <div className="flex flex-col md:flex-row md:items-center justify-between brutal-panel p-6 border-accent gap-4">
                      <div>
                        <h2 className="text-2xl font-display font-bold text-textmain tracking-widest flex items-center gap-3">
                          <Icon name="git-merge" className="w-6 h-6 text-accent"/> DOWNLOAD_PLAN
                        </h2>
                        <p className="text-xs text-textmuted mt-2">Configure nodes for localized archival. Uncheck to ignore.</p>
                      </div>
                      <div className="flex flex-wrap items-center gap-3">
                        <button 
                          onClick={() => setSelection(prev => ({ ...prev, excluded_attachment_ids: [] }))} 
                          className="brutal-btn px-4 py-2 secondary text-xs"
                        >
                          <Icon name="check-square" className="w-3 h-3 text-success"/> ALL
                        </button>
                        <button 
                           onClick={() => {
                             const allIds = [];
                             plan.courses?.forEach(c => c.topics?.forEach(t => t.materials?.forEach(m => m.attachments?.forEach(a => allIds.push(a.id)))));
                             setSelection(prev => ({ ...prev, excluded_attachment_ids: allIds }));
                           }} 
                           className="brutal-btn px-4 py-2 secondary text-xs"
                        >
                          <Icon name="x-square" className="w-3 h-3 text-red-500"/> NONE
                        </button>
                        <button id="save-btn-plan" onClick={() => handleSaveSelection('save-btn-plan')} className="brutal-btn px-6 py-2 text-xs">
                          <Icon name="save" className="w-3 h-3"/> COMMIT
                        </button>
                      </div>
                    </div>
                    
                    <div className="flex flex-col gap-4 font-mono">
                      {plan.courses?.map(course => {
                        const allCourseAtts = [];
                        course.topics?.forEach(t => t.materials?.forEach(m => m.attachments?.forEach(a => allCourseAtts.push(a.id))));
                        const totalCourse = allCourseAtts.length;
                        const excludedCourse = allCourseAtts.filter(id => selection?.excluded_attachment_ids?.includes(id)).length;
                        const selectedCourse = totalCourse - excludedCourse;
                        const courseFullySelected = totalCourse > 0 && selectedCourse === totalCourse;
                        const courseFullyEmpty = totalCourse > 0 && selectedCourse === 0;

                        return (
                        <details key={course.id} className="group brutal-panel overflow-hidden transition-all duration-300 [&_summary::-webkit-details-marker]:hidden border-muted">
                          <summary className="flex cursor-pointer items-center justify-between p-4 bg-[#0a0a0a] hover:bg-[#111] transition-colors border-b border-transparent group-open:border-muted">
                            <div className="flex items-center gap-4">
                              <span className="text-accent group-open:rotate-90 transition-transform"><Icon name="chevron-right" className="w-4 h-4"/></span>
                              <h3 className={`font-bold text-sm ${courseFullyEmpty ? 'text-textmuted line-through' : 'text-textmain'}`}>
                                {course.name} <span className="text-textmuted font-normal">[{course.teacher}]</span>
                              </h3>
                            </div>
                            <div className="flex items-center gap-4 text-xs font-bold">
                              <span className={`px-2 py-1 border ${courseFullySelected ? 'border-success text-success' : courseFullyEmpty ? 'border-red-500 text-red-500' : 'border-accent text-accent'}`}>
                                {selectedCourse} / {totalCourse} NODES
                              </span>
                              {totalCourse > 0 && (
                                <div className="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                  <button onClick={(e) => {
                                    e.preventDefault(); e.stopPropagation();
                                    setSelection(prev => {
                                      const excl = new Set(prev.excluded_attachment_ids || []);
                                      allCourseAtts.forEach(id => excl.delete(id));
                                      return { ...prev, excluded_attachment_ids: [...excl] };
                                    });
                                  }} className="px-2 py-0.5 border border-muted text-textmuted hover:text-success hover:border-success transition-colors">ALL</button>
                                  <button onClick={(e) => {
                                    e.preventDefault(); e.stopPropagation();
                                    setSelection(prev => {
                                      const excl = new Set(prev.excluded_attachment_ids || []);
                                      allCourseAtts.forEach(id => excl.add(id));
                                      return { ...prev, excluded_attachment_ids: [...excl] };
                                    });
                                  }} className="px-2 py-0.5 border border-muted text-textmuted hover:text-red-500 hover:border-red-500 transition-colors">NONE</button>
                                </div>
                              )}
                            </div>
                          </summary>
                          
                          <div className="flex flex-col divide-y divide-muted bg-dark pl-8 pb-4">
                            {(course.topics || []).length === 0 ? (
                               <div className="p-4 text-xs text-textmuted">[ NO_DATA ]</div>
                            ) : null}
                            {course.topics?.map(topic => {
                              const allTopicAtts = [];
                              topic.materials?.forEach(m => m.attachments?.forEach(a => allTopicAtts.push(a.id)));
                              const totalTopic = allTopicAtts.length;
                              const excludedTopic = allTopicAtts.filter(id => selection?.excluded_attachment_ids?.includes(id)).length;
                              const selectedTopic = totalTopic - excludedTopic;
                              const topicFullySelected = totalTopic > 0 && selectedTopic === totalTopic;
                              const topicFullyEmpty = totalTopic > 0 && selectedTopic === 0;

                              return (
                              <div key={topic.id} className="p-4 pl-0">
                                <div className="flex items-center justify-between mb-4 border-l border-muted pl-4">
                                  <h4 className={`text-xs font-bold flex items-center gap-2 ${topicFullyEmpty ? 'text-textmuted line-through' : 'text-textmain'}`}>
                                    <Icon name="corner-down-right" className="w-4 h-4 text-muted"/>
                                    {topic.title || 'ROOT'}
                                  </h4>
                                  <div className="flex items-center gap-3">
                                    <span className={`text-[10px] font-bold px-2 py-0.5 border ${topicFullySelected ? 'text-success border-success' : topicFullyEmpty ? 'text-red-500 border-red-500' : 'text-accent border-accent'}`}>
                                      {selectedTopic}/{totalTopic}
                                    </span>
                                    {totalTopic > 0 && (
                                      <div className="flex items-center gap-1">
                                        <button onClick={() => {
                                          setSelection(prev => {
                                            const excl = new Set(prev.excluded_attachment_ids || []);
                                            allTopicAtts.forEach(id => excl.delete(id));
                                            return { ...prev, excluded_attachment_ids: [...excl] };
                                          });
                                        }} className="text-[9px] px-1 border border-transparent hover:border-success hover:text-success text-textmuted transition-colors">ALL</button>
                                        <button onClick={() => {
                                          setSelection(prev => {
                                            const excl = new Set(prev.excluded_attachment_ids || []);
                                            allTopicAtts.forEach(id => excl.add(id));
                                            return { ...prev, excluded_attachment_ids: [...excl] };
                                          });
                                        }} className="text-[9px] px-1 border border-transparent hover:border-red-500 hover:text-red-500 text-textmuted transition-colors">NONE</button>
                                      </div>
                                    )}
                                  </div>
                                </div>
                                <div className="flex flex-col gap-2 pl-9">
                                  {Object.entries((topic.materials || []).reduce((acc, mat) => {
                                    const t = mat.type ? mat.type.toLowerCase() : 'other';
                                    if (!acc[t]) acc[t] = [];
                                    acc[t].push(mat);
                                    return acc;
                                  }, {})).map(([mType, mats]) => (
                                    <div key={mType} className={`flex flex-col gap-2 border-l border-muted/50 pl-4 py-2`}>
                                      <h5 className="text-[10px] font-bold text-textmuted uppercase tracking-widest border-b border-muted/50 pb-1 inline-block w-max">
                                        {mType}s
                                      </h5>
                                      {mats.map(mat => (
                                        <div key={mat.id} className="flex flex-col gap-1 mt-2">
                                          <div className="text-xs font-bold text-textmain flex items-center gap-2">
                                            <span className="text-muted">|-</span> {mat.title}
                                          </div>
                                          
                                          <div className="flex flex-col gap-1 pl-4 mt-1">
                                            {mat.attachments?.map(att => {
                                              const isExcluded = selection?.excluded_attachment_ids?.includes(att.id);
                                              return (
                                              <label key={att.id} className={`flex items-center gap-3 text-xs p-1.5 transition-colors cursor-pointer border ${isExcluded ? 'border-transparent text-textmuted opacity-50' : 'border-muted bg-[#111] hover:border-accent text-textmain'}`}>
                                                <input 
                                                  type="checkbox" 
                                                  checked={!isExcluded} 
                                                  className="appearance-none w-3 h-3 border border-textmuted checked:bg-accent checked:border-accent disabled:opacity-50 cursor-pointer"
                                                  onChange={(e) => {
                                                    const checked = e.target.checked;
                                                    setSelection(prev => {
                                                      const ns = {...prev};
                                                      if (!ns.excluded_attachment_ids) ns.excluded_attachment_ids = [];
                                                      if (!checked) {
                                                        ns.excluded_attachment_ids.push(att.id);
                                                      } else {
                                                        ns.excluded_attachment_ids = ns.excluded_attachment_ids.filter(id => id !== att.id);
                                                      }
                                                      return ns;
                                                    });
                                                  }}
                                                />
                                                <Icon name={att.provider === 'youtube' ? 'youtube' : att.provider === 'form' ? 'form-input' : 'file-code'} className="h-3 w-3 text-textmuted" />
                                                <span className={`truncate flex-1 font-mono ${isExcluded ? 'line-through' : ''}`}>{att.filename}</span>
                                                <span className="text-[9px] text-textmuted font-bold tracking-tight">[{bytesToSize(att.size_bytes)}]</span>
                                              </label>
                                            )})}
                                            {(!mat.attachments || mat.attachments.length === 0) && (
                                              <span className="text-[10px] text-textmuted border border-dashed border-muted p-1 inline-block w-max">[ NO_ATTACHMENTS ]</span>
                                            )}
                                          </div>
                                        </div>
                                      ))}
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )})}
                          </div>
                        </details>
                      )})}
                    </div>
                  </div>
                )}

                {/* ----------------- CONFIG / SETTINGS TAB ----------------- */}
                {activeTab === 'settings' && (
                  <div className="flex flex-col gap-8 animate-in fade-in duration-300">
                    <div className="flex items-center gap-4 border-b border-muted pb-4">
                      <Icon name="settings" className="w-6 h-6 text-textmain"/>
                      <h2 className="text-2xl font-display font-bold text-textmain tracking-widest">SYSTEM_CONFIG</h2>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="brutal-panel p-6 border-muted flex flex-col gap-4">
                        <div className="flex items-center gap-3">
                           <Icon name="folder-tree" className="h-5 w-5 text-accent" />
                           <h3 className="font-bold text-textmain text-sm">STORAGE_TOPOLOGY</h3>
                        </div>
                        <p className="text-xs text-textmuted leading-relaxed font-mono mt-2">
                           All records are strictly localized. Target output directory: <span className="text-textmain border border-muted px-1">./output/</span>
                        </p>
                        <div className="mt-auto pt-4 border-t border-muted">
                          <ul className="text-xs font-mono flex flex-col gap-2 text-textmuted">
                            <li className="flex items-center gap-2"><Icon name="file-json" className="h-3 w-3"/> ./output/master_index.json</li>
                            <li className="flex items-center gap-2"><Icon name="database" className="h-3 w-3"/> ./database/classroom.db</li>
                            <li className="flex items-center gap-2"><Icon name="files" className="h-3 w-3"/> ./output/courses/*</li>
                          </ul>
                        </div>
                      </div>

                      <div className="brutal-panel p-6 border-muted flex flex-col gap-4">
                        <div className="flex items-center gap-3">
                           <Icon name="shield-check" className="h-5 w-5 text-success" />
                           <h3 className="font-bold text-textmain text-sm">CACHING_MECHANISM</h3>
                        </div>
                        <p className="text-xs text-textmuted leading-relaxed font-mono mt-2">
                          Downloader maintains internal state to skip processed payloads.
                        </p>
                        <p className="text-xs text-success bg-success/10 border border-success/30 p-3 mt-2">
                          > STATE: ACTIVE<br/>
                          > RESTARTING DOWNLOADER WILL BYPASS CACHED FILES.
                        </p>
                      </div>

                      <div className="brutal-panel p-6 border-muted flex flex-col gap-4 md:col-span-2">
                        <div className="flex items-center justify-between border-b border-muted pb-4">
                          <div className="flex items-center gap-3">
                            <Icon name="hard-drive" className="h-5 w-5 text-textmain" />
                            <h3 className="font-bold text-textmain text-sm">LOCAL_REGISTRY</h3>
                          </div>
                          <span className="text-xs font-bold text-accent border border-accent px-2 py-1">TOTAL_NODES: {dbFiles?.filter(f => f.status === 'complete').length || 0}</span>
                        </div>
                        
                        <div className="mt-2 border border-muted bg-dark overflow-hidden">
                          <div className="max-h-[300px] overflow-y-auto w-full text-xs font-mono whitespace-nowrap">
                            <table className="w-full text-left border-collapse">
                              <thead className="bg-[#111] border-b border-muted sticky top-0 z-10">
                                <tr>
                                  <th className="px-4 py-3 font-bold text-textmuted w-1/4">COURSE_ID</th>
                                  <th className="px-4 py-3 font-bold text-textmuted w-1/3">PAYLOAD_NAME</th>
                                  <th className="px-4 py-3 font-bold text-textmuted">LOCAL_URI</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-muted text-textmuted">
                                {!dbFiles || dbFiles.filter(f => f.status === 'complete').length === 0 ? (
                                  <tr><td colSpan="3" className="px-4 py-8 text-center opacity-50">[ REGISTRY_EMPTY ]</td></tr>
                                ) : dbFiles.filter(f => f.status === 'complete').map(f => (
                                  <tr key={f.id} className="hover:bg-[#1a1a1a] hover:text-textmain transition-colors">
                                    <td className="px-4 py-2 truncate max-w-[150px]" title={f.course_name}>{f.course_name}</td>
                                    <td className="px-4 py-2 font-bold truncate max-w-[200px]" title={f.filename}>{f.filename}</td>
                                    <td className="px-4 py-2 truncate max-w-[300px]" title={f.local_path}>{f.local_path}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>

                      <div className="brutal-panel p-6 border-red-500 bg-red-500/5 flex flex-col gap-4 md:col-span-2 relative overflow-hidden">
                        <div className="flex items-center gap-3">
                           <Icon name="alert-triangle" className="h-5 w-5 text-red-500" />
                           <h3 className="font-bold text-red-500 text-sm">CRITICAL_OPERATIONS</h3>
                        </div>
                        <p className="text-xs text-textmuted leading-relaxed font-mono mt-2">
                          Wipe internal SQLite database. Does not remove downloaded files from disk.
                          <br/><span className="text-red-400 font-bold">> WARNING: IRREVERSIBLE ACTION.</span>
                        </p>
                        <div className="mt-4">
                          <button onClick={handleResetDatabase} className="brutal-btn danger px-6 py-2 text-xs">
                            <Icon name="trash-2" className="w-3 h-3"/> [ EXECUTE_PURGE ]
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
