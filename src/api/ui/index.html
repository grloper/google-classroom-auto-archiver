<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classroom Downloader Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Load Canvas Background Animation -->
  <script src="/canvas.js" defer></script>

  <style>
    body { background-color: #eef2f6; color: #0f172a; margin: 0; overflow: hidden; }
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
    
    /* Clean custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.5); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.8); }

    /* Glassmorphism utilities */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.04);
    }
    
    .glass-header {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
    }

    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function Icon({ name, className = "" }) {
      const svgRef = React.useRef(null);
      
      useEffect(() => {
        if (svgRef.current && window.lucide) {
          window.lucide.createIcons({
            icons: { [name]: window.lucide.icons[name] },
            attrs: { class: className },
            nameAttr: 'data-lucide'
          });
        }
      }, [name, className]);

      return <i ref={svgRef} data-lucide={name}></i>;
    }

    function bytesToSize(bytes) {
      if (!bytes) return 'Unknown';
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
      if (bytes === 0) return '0 Byte';
      const i = parseInt(Math.floor(Math.log(bytes) / Math.log(1024)));
      return Math.round(bytes / Math.pow(1024, i), 2) + ' ' + sizes[i];
    }

    // Determine base API URL dynamically based on where the UI is served from
    const API_BASE = window.location.origin;

    function App() {
      const [apiStatus, setApiStatus] = useState({ online: false, counts: null });
      const [plan, setPlan] = useState(null);
      const [selection, setSelection] = useState(null);
      const [dbFiles, setDbFiles] = useState([]);
      const [coursesData, setCoursesData] = useState(null);
      const [selectedCourseId, setSelectedCourseId] = useState(null);
      const [activeTab, setActiveTab] = useState('classroom');
      const [loading, setLoading] = useState(true);

      const refreshData = async (silent = false) => {
        if (!silent) setLoading(true);
        try {
          const [resHealth, resPlan, resSel, resFiles, resCourses] = await Promise.all([
            fetch(`${API_BASE}/health`).catch(() => ({ ok: false })),
            fetch(`${API_BASE}/plan`).catch(() => ({ ok: false })),
            fetch(`${API_BASE}/selection`).catch(() => ({ ok: false })),
            fetch(`${API_BASE}/db/files`).catch(() => ({ ok: false })),
            fetch(`${API_BASE}/courses`).catch(() => ({ ok: false }))
          ]);

          if (resHealth.ok) {
            const data = await resHealth.json();
            setApiStatus({ online: true, counts: data.counts });
          } else {
            setApiStatus({ online: false, counts: null });
          }
          
          if (resPlan.ok) setPlan(await resPlan.json());
          if (resSel.ok) setSelection(await resSel.json() || { selection_mode: 'implicit', excluded_attachment_ids: [] });
          if (resFiles.ok) setDbFiles(await resFiles.json() || []);
          if (resCourses.ok) setCoursesData(await resCourses.json());
        } catch (e) {
          setApiStatus({ online: false, counts: null });
          console.error("API not available", e);
        }
        if (!silent) setLoading(false);
      };

      useEffect(() => {
        refreshData();
        const poller = setInterval(() => {
          refreshData(true);
        }, 3000);
        return () => clearInterval(poller);
      }, []);

      useEffect(() => {
        if (coursesData?.courses?.length > 0 && !selectedCourseId) {
          setSelectedCourseId(coursesData.courses[0].id);
        }
      }, [coursesData, selectedCourseId]);

      const getStats = useMemo(() => {
        if (!plan) return { courses: 0, items: 0, bytes: 0 };
        let items = 0, bytes = 0;
        plan.courses?.forEach(c => {
          c.topics?.forEach(t => {
            t.materials?.forEach(m => {
              m.attachments?.forEach(a => {
                items++;
                bytes += (a.size_bytes || 0);
              });
            });
          });
        });
        return { courses: plan.courses?.length || 0, items, bytes };
      }, [plan]);

      const handleTriggerRefreshPlan = async () => {
        await fetch(`${API_BASE}/plan/refresh`, { method: 'POST' });
        alert('Crawl command sent to sync Classroom. Monitor terminal for metadata generation progress, then refresh this page.');
      };

      const handleSaveSelection = async (btnId) => {
        if (!selection) return;

        const excludedCount = selection.excluded_attachment_ids?.length || 0;
        const totalCount = getStats.items;
        const includedCount = totalCount - excludedCount;

        const confirmed = window.confirm(
          `Are you sure you want to save this download plan?\n\n` +
          `✅ Included: ${includedCount} items\n` +
          `❌ Excluded: ${excludedCount} items\n\n` +
          `Excluded items will be skipped during the next download cycle. You can change this at any time.`
        );

        if (!confirmed) return;

        const payloadToSave = { ...selection, selection_mode: 'implicit' };

        await fetch(`${API_BASE}/selection`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payloadToSave)
        });
        
        const btn = document.getElementById(btnId);
        if(!btn) return;
        const origText = btn.innerHTML;
        btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Saved Successfully!`;
        btn.classList.add('bg-emerald-500', 'text-white', 'border-emerald-600');
        btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-700', 'bg-white', 'text-slate-700');
        if (window.lucide) window.lucide.createIcons();
        
        setTimeout(() => {
          btn.innerHTML = origText;
          btn.className = btn.getAttribute('data-orig-class');
          if (window.lucide) window.lucide.createIcons();
        }, 2500);
      };

      const handleStartDownload = async () => {
        await fetch(`${API_BASE}/downloads/selected`, { method: 'POST' });
        alert('Download process activated. See terminal for real-time progress.');
      };

      const handleResetDatabase = async () => {
        const confirmed = window.confirm(
          '⚠️ WARNING: This will completely wipe all local database metadata, including download history, tracked courses, and selection plans.\n\n' +
          'It will NOT delete your downloaded files on disk, but the system will forget it downloaded them, so a future run may redownload them.\n\n' +
          'Are you absolutely sure you want to factory reset the local database?'
        );
        if (!confirmed) return;
        
        try {
          const res = await fetch(`${API_BASE}/db/reset`, { method: 'DELETE' });
          if (res.ok) {
            alert('Database has been completely erased.');
            refreshData(); 
          } else {
            alert('Failed to reset database.');
          }
        } catch (e) {
          console.error(e);
          alert('Error communicating with the engine.');
        }
      };

      if (loading && !plan) {
        return (
          <div className="flex h-screen items-center justify-center relative z-10">
            <div className="glass-card p-10 rounded-3xl flex flex-col items-center gap-4">
              <Icon name="loader-2" className="animate-spin text-blue-500 w-10 h-10" /> 
              <span className="text-xl font-medium text-slate-600">Initializing Workspace...</span>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen flex-col overflow-hidden font-sans relative z-10">
          <header className="flex h-16 shrink-0 items-center justify-between px-6 glass-header z-20">
            <div className="flex items-center gap-4">
              <div className="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 shadow-lg shadow-blue-500/30 text-white">
                <Icon name="download-cloud" className="h-5 w-5" />
              </div>
              <h1 className="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-600">Classroom Downloader</h1>
            </div>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2 rounded-full glass-card px-4 py-1.5 text-sm font-medium shadow-sm transition-all hover:shadow">
                <span className={`h-2.5 w-2.5 rounded-full shadow-sm ${apiStatus.online ? 'bg-emerald-500 shadow-emerald-500/50' : 'bg-red-500 animate-pulse-slow shadow-red-500/50'}`}></span>
                <span className="text-slate-700">{apiStatus.online ? 'Engine Connected' : 'Engine Offline'}</span>
              </div>
            </div>
          </header>

          <main className="flex flex-1 overflow-hidden">
            <aside className="w-64 p-4 flex flex-col gap-2 glass-panel z-10 border-r-0 border-white/40 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
              <div className="text-[10px] font-bold uppercase tracking-widest text-slate-400 px-3 mb-2 mt-2">Navigation</div>
              {[
                { id: 'classroom', icon: 'presentation', label: 'My Classroom' },
                { id: 'overview', icon: 'layout-dashboard', label: 'Overview' },
                { id: 'courses', icon: 'list-tree', label: 'Download Plan' },
                { id: 'settings', icon: 'settings', label: 'System Details' }
              ].map(tab => (
                <div 
                  key={tab.id}
                  className={`cursor-pointer rounded-xl px-4 py-3 font-medium flex gap-3 items-center transition-all duration-300 ${activeTab === tab.id ? 'bg-white/80 text-blue-600 shadow-sm border border-white/60' : 'text-slate-600 hover:bg-white/40 hover:text-slate-900 border border-transparent'}`}
                  onClick={() => setActiveTab(tab.id)}
                >
                  <Icon name={tab.icon} className={`w-4 h-4 ${activeTab === tab.id ? 'text-blue-500' : 'opacity-70'}`} /> {tab.label}
                </div>
              ))}
            </aside>

            <section className="flex-1 overflow-y-auto p-8 relative">
              <div className="max-w-6xl mx-auto space-y-6 pb-20">
                
                {activeTab === 'classroom' && coursesData && (
                  <div className="flex flex-col gap-6 animate-in fade-in zoom-in-95 duration-300">
                    <div className="flex items-center justify-between glass-card p-4 px-6 rounded-2xl border-white/60">
                      <div>
                        <h2 className="text-2xl font-bold text-slate-800 tracking-tight">My Classroom</h2>
                        <p className="text-sm text-slate-500 mt-1">View your downloaded materials and assignments. Click files to open them instantly.</p>
                      </div>
                      <select 
                        className="rounded-xl border border-white/60 bg-white/50 backdrop-blur-md px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20 transition-all cursor-pointer hover:bg-white/80"
                        value={selectedCourseId || ''}
                        onChange={(e) => setSelectedCourseId(e.target.value)}
                      >
                        <option value="" disabled>Select a Course</option>
                        {coursesData.courses?.map(c => (
                          <option key={c.id} value={c.id}>{c.name}</option>
                        ))}
                      </select>
                    </div>

                    <div className="flex flex-col gap-8">
                      {coursesData.courses?.filter(c => c.id === selectedCourseId).map(course => (
                        <div key={course.id} className="flex flex-col gap-8">
                          {/* Course Header */}
                          <div className="rounded-[2rem] bg-gradient-to-br from-blue-600/90 via-indigo-600/90 to-purple-700/90 backdrop-blur-md p-10 text-white shadow-xl shadow-blue-900/10 border border-white/20 relative overflow-hidden group">
                            <div className="absolute -top-20 -right-20 p-8 opacity-10 group-hover:scale-110 group-hover:rotate-6 group-hover:opacity-20 transition-all duration-700">
                              <Icon name="book-open" className="w-96 h-96" />
                            </div>
                            <div className="relative z-10">
                              <h1 className="text-5xl font-extrabold mb-4 tracking-tight drop-shadow-sm">{course.name}</h1>
                              <p className="text-blue-100 font-medium text-lg flex items-center gap-2">
                                <span className="bg-white/20 p-1.5 rounded-lg backdrop-blur-md"><Icon name="user" className="w-4 h-4"/></span> {course.teacher}
                              </p>
                              {course.section && <p className="text-sm text-blue-200 mt-3 bg-black/20 inline-block px-4 py-1.5 rounded-full backdrop-blur-md border border-white/10">{course.section}</p>}
                            </div>
                          </div>

                          {/* Topics */}
                          <div className="flex flex-col gap-8">
                            {course.topics?.map(topic => (
                              <div key={topic.id} className="flex flex-col gap-5">
                                <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-3 pl-2">
                                  <div className="p-2 bg-white/60 rounded-xl shadow-sm border border-white/80 text-blue-500">
                                    <Icon name="folder" className="w-5 h-5"/>
                                  </div>
                                  {topic.title || 'Stream / General'}
                                </h2>
                                
                                <div className="grid grid-cols-1 gap-5">
                                  {topic.materials?.map(mat => {
                                    const mType = mat.type ? mat.type.toLowerCase() : 'other';
                                    const isAssignment = mType === 'assignment';
                                    return (
                                      <div key={mat.id} className={`flex gap-5 p-6 rounded-2xl glass-card transition-all duration-300 hover:shadow-lg hover:-translate-y-0.5 ${isAssignment ? 'border-l-4 border-l-blue-500' : 'border-l-4 border-l-emerald-500'}`}>
                                        <div className={`mt-1 flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl shadow-sm ${isAssignment ? 'bg-gradient-to-br from-blue-100 to-blue-50 text-blue-600 border border-blue-200/50' : 'bg-gradient-to-br from-emerald-100 to-emerald-50 text-emerald-600 border border-emerald-200/50'}`}>
                                          <Icon name={isAssignment ? 'clipboard-check' : 'book-open'} className="w-7 h-7"/>
                                        </div>
                                        <div className="flex-1 flex flex-col gap-3 min-w-0">
                                          <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-2">
                                            <div>
                                              <h3 className="font-bold text-xl text-slate-800">{mat.title}</h3>
                                              <div className="flex gap-2 items-center mt-2">
                                                <span className={`text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-widest ${isAssignment ? 'bg-blue-100/50 text-blue-700' : 'bg-emerald-100/50 text-emerald-700'}`}>{mType}</span>
                                                {mat.due_date && <span className="text-[11px] font-bold text-rose-600 bg-rose-50/80 px-2.5 py-1 rounded-md border border-rose-100/50 flex items-center gap-1.5"><Icon name="clock" className="w-3.5 h-3.5"/> Due: {mat.due_date}</span>}
                                              </div>
                                            </div>
                                          </div>
                                          {mat.description && <p className="text-sm text-slate-600 whitespace-pre-wrap bg-white/40 p-4 rounded-xl border border-white/60 mt-1 leading-relaxed">{mat.description}</p>}
                                          
                                          {/* Attachments Grid */}
                                          {mat.attachments?.length > 0 && (
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mt-4 pt-4 border-t border-slate-200/50">
                                              {mat.attachments.map(att => {
                                                const isDownloaded = att.status === 'complete' && att.local_path;
                                                return (
                                                  <div key={att.id} className={`group flex items-center gap-3 p-3 rounded-xl border transition-all duration-300 ${isDownloaded ? 'border-white/60 bg-white/60 hover:bg-white hover:border-blue-300 hover:shadow-md cursor-pointer' : 'border-dashed border-slate-300/60 bg-slate-50/40 opacity-70'} `}
                                                    onClick={() => {
                                                      if (isDownloaded) {
                                                        fetch(`${API_BASE}/open`, {
                                                          method: 'POST',
                                                          headers: { 'Content-Type': 'application/json' },
                                                          body: JSON.stringify({ id: att.id })
                                                        }).then(async res => {
                                                          if (!res.ok) {
                                                            const data = await res.json().catch(() => ({}));
                                                            alert(`Failed to open file: ${data.error || res.statusText}`);
                                                          }
                                                        }).catch(err => alert('Failed to open file.'));
                                                      }
                                                    }}
                                                  >
                                                    <div className={`flex items-center justify-center w-11 h-11 rounded-xl shadow-sm transition-transform group-hover:scale-105 ${isDownloaded ? 'bg-gradient-to-br from-blue-50 to-white text-blue-600 border border-blue-100' : 'bg-slate-200/50 text-slate-400'}`}>
                                                      <Icon name={att.provider === 'youtube' ? 'youtube' : att.provider === 'form' ? 'form-input' : 'file-text'} className="h-5 w-5" />
                                                    </div>
                                                    <div className="flex-1 min-w-0 flex flex-col justify-center">
                                                      <span className={`truncate text-sm font-semibold ${isDownloaded ? 'text-slate-800' : 'text-slate-500'}`} title={att.filename}>{att.filename}</span>
                                                      <span className={`text-[11px] font-bold flex items-center gap-1 mt-0.5 tracking-wide ${isDownloaded ? 'text-blue-500' : 'text-slate-400'}`}>
                                                        {isDownloaded ? <><Icon name="external-link" className="w-3 h-3"/> Click to open</> : 'Pending Download'}
                                                      </span>
                                                    </div>
                                                  </div>
                                                );
                                              })}
                                            </div>
                                          )}
                                        </div>
                                      </div>
                                    );
                                  })}
                                  {(!topic.materials || topic.materials.length === 0) && (
                                    <div className="text-sm text-slate-500 italic p-6 glass-card rounded-2xl border-dashed border-slate-300 flex items-center gap-3">
                                      <Icon name="inbox" className="w-5 h-5 text-slate-400"/> No items posted in this topic yet.
                                    </div>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === 'overview' && (
                  <div className="flex flex-col gap-6 animate-in fade-in zoom-in-95 duration-300">
                    <div className="glass-card rounded-3xl p-8 shadow-sm">
                      <div className="flex items-center gap-4 mb-6">
                        <div className="p-3 bg-blue-500/10 rounded-2xl text-blue-600 border border-blue-500/20"><Icon name="info" className="w-6 h-6"/></div>
                        <h2 className="text-2xl font-bold text-slate-800">Getting Started</h2>
                      </div>
                      <p className="text-slate-600 mb-8 text-base leading-relaxed max-w-3xl font-medium bg-white/40 p-6 rounded-2xl border border-white/60">
                        Welcome to the next generation of Classroom Downloader. This dashboard intelligently connects to your local engine to view all discovered courses, topics, and materials. You have full control over what is archived locally.
                      </p>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {[
                          { label: 'Available Courses', value: getStats.courses, icon: 'library', color: 'blue' },
                          { label: 'Total Available Items', value: getStats.items, icon: 'paperclip', color: 'purple' },
                          { label: 'Total File Size (Est.)', value: bytesToSize(getStats.bytes), icon: 'hard-drive', color: 'emerald' }
                        ].map((stat, i) => (
                          <div key={i} className="rounded-2xl border border-white/60 bg-white/50 backdrop-blur-md p-6 shadow-sm hover:shadow-md transition-shadow group">
                            <div className="flex items-center gap-4 mb-4">
                              <div className={`p-3 bg-${stat.color}-500/10 rounded-xl text-${stat.color}-600 border border-${stat.color}-500/20 group-hover:scale-110 transition-transform`}><Icon name={stat.icon} className="w-5 h-5"/></div>
                              <div className="text-sm font-bold text-slate-500 uppercase tracking-wider">{stat.label}</div>
                            </div>
                            <div className="text-4xl font-extrabold text-slate-800 tracking-tight">{stat.value}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <div className="glass-card rounded-3xl p-8 shadow-sm">
                      <div className="flex items-center gap-4 mb-6">
                        <div className="p-3 bg-amber-500/10 rounded-2xl text-amber-600 border border-amber-500/20"><Icon name="play-circle" className="w-6 h-6"/></div>
                        <h3 className="text-2xl font-bold text-slate-800">Quick Actions</h3>
                      </div>
                      <div className="flex flex-wrap gap-4">
                        <button onClick={handleTriggerRefreshPlan} className="flex items-center gap-2 rounded-xl bg-white/80 border border-white px-6 py-3 font-semibold text-slate-700 shadow-sm hover:bg-white transition-all active:scale-95 hover:shadow-md">
                          <Icon name="refresh-cw" className="w-4 h-4"/> Sync Classroom Data
                        </button>
                        <button id="save-btn-overview" data-orig-class="flex items-center gap-2 rounded-xl bg-blue-600 px-6 py-3 font-semibold text-white shadow-md shadow-blue-500/20 hover:bg-blue-700 hover:shadow-lg transition-all active:scale-95" onClick={() => handleSaveSelection('save-btn-overview')} className="flex items-center gap-2 rounded-xl bg-blue-600 px-6 py-3 font-semibold text-white shadow-md shadow-blue-500/20 hover:bg-blue-700 hover:shadow-lg transition-all active:scale-95">
                          <Icon name="save" className="w-4 h-4"/> Save Download Plan
                        </button>
                        <button onClick={handleStartDownload} className="flex items-center gap-2 rounded-xl bg-emerald-600 px-6 py-3 font-semibold text-white shadow-md shadow-emerald-500/20 hover:bg-emerald-700 hover:shadow-lg transition-all active:scale-95">
                          <Icon name="download" className="w-4 h-4"/> Start Downloading
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'courses' && plan && (
                  <div className="flex flex-col gap-6 animate-in fade-in zoom-in-95 duration-300">
                    <div className="flex flex-col md:flex-row md:items-center justify-between glass-card p-6 rounded-3xl border-white/60 gap-4">
                      <div>
                        <h2 className="text-2xl font-bold text-slate-800 tracking-tight">Select Files to Download</h2>
                        <p className="text-sm text-slate-500 mt-1 font-medium">Review the materials below. Uncheck anything you don't want to download.</p>
                      </div>
                      <div className="flex items-center gap-3">
                        <button 
                          onClick={() => setSelection(prev => ({ ...prev, excluded_attachment_ids: [] }))} 
                          className="flex items-center gap-2 rounded-xl bg-white/70 border border-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-white transition-all active:scale-95"
                        >
                          <Icon name="check-square" className="w-4 h-4 text-emerald-500"/> Select All
                        </button>
                        <button 
                           onClick={() => {
                             const allIds = [];
                             plan.courses?.forEach(c => c.topics?.forEach(t => t.materials?.forEach(m => m.attachments?.forEach(a => allIds.push(a.id)))));
                             setSelection(prev => ({ ...prev, excluded_attachment_ids: allIds }));
                           }} 
                           className="flex items-center gap-2 rounded-xl bg-white/70 border border-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-white transition-all active:scale-95"
                        >
                          <Icon name="x-square" className="w-4 h-4 text-red-500"/> Deselect All
                        </button>
                        <button id="save-btn-plan" data-orig-class="flex items-center gap-2 rounded-xl bg-blue-600 px-5 py-2 text-sm font-bold text-white shadow-md shadow-blue-500/20 hover:bg-blue-700 transition-all active:scale-95" onClick={() => handleSaveSelection('save-btn-plan')} className="flex items-center gap-2 rounded-xl bg-blue-600 px-5 py-2 text-sm font-bold text-white shadow-md shadow-blue-500/20 hover:bg-blue-700 transition-all active:scale-95">
                          <Icon name="save" className="w-4 h-4"/> Save Plan
                        </button>
                      </div>
                    </div>
                    
                    <div className="flex flex-col gap-4">
                      {plan.courses?.map(course => {
                        const allCourseAtts = [];
                        course.topics?.forEach(t => t.materials?.forEach(m => m.attachments?.forEach(a => allCourseAtts.push(a.id))));
                        const totalCourse = allCourseAtts.length;
                        const excludedCourse = allCourseAtts.filter(id => selection?.excluded_attachment_ids?.includes(id)).length;
                        const selectedCourse = totalCourse - excludedCourse;
                        const courseFullySelected = totalCourse > 0 && selectedCourse === totalCourse;
                        const courseFullyEmpty = totalCourse > 0 && selectedCourse === 0;

                        return (
                        <details key={course.id} className="group glass-card rounded-2xl overflow-hidden transition-all duration-300 [&_summary::-webkit-details-marker]:hidden">
                          <summary className="flex cursor-pointer items-center justify-between p-6 bg-white/30 hover:bg-white/60 transition-colors border-b border-transparent group-open:border-white/50">
                            <div className="flex items-center gap-4">
                              <h3 className={`font-bold text-xl ${courseFullyEmpty ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{course.name}</h3>
                              <span className="rounded-lg bg-white/60 border border-white px-3 py-1 text-xs font-bold text-slate-600 shadow-sm backdrop-blur-md">{course.teacher}</span>
                            </div>
                            <div className="flex items-center gap-4 text-slate-400">
                              <span className={`text-xs font-bold px-3 py-1 rounded-lg border shadow-sm backdrop-blur-md ${courseFullySelected ? 'bg-emerald-500/10 text-emerald-700 border-emerald-500/20' : courseFullyEmpty ? 'bg-red-500/10 text-red-500 border-red-500/20' : 'bg-blue-500/10 text-blue-700 border-blue-500/20'}`}>
                                {selectedCourse} / {totalCourse} items
                              </span>
                              {totalCourse > 0 && (
                                <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                  <button onClick={(e) => {
                                    e.preventDefault(); e.stopPropagation();
                                    setSelection(prev => {
                                      const excl = new Set(prev.excluded_attachment_ids || []);
                                      allCourseAtts.forEach(id => excl.delete(id));
                                      return { ...prev, excluded_attachment_ids: [...excl] };
                                    });
                                  }} className="px-2 py-1 text-[10px] uppercase font-bold rounded-md bg-white border border-slate-200 text-slate-600 hover:bg-emerald-500 hover:text-white hover:border-emerald-500 transition-all shadow-sm">All</button>
                                  <button onClick={(e) => {
                                    e.preventDefault(); e.stopPropagation();
                                    setSelection(prev => {
                                      const excl = new Set(prev.excluded_attachment_ids || []);
                                      allCourseAtts.forEach(id => excl.add(id));
                                      return { ...prev, excluded_attachment_ids: [...excl] };
                                    });
                                  }} className="px-2 py-1 text-[10px] uppercase font-bold rounded-md bg-white border border-slate-200 text-slate-600 hover:bg-red-500 hover:text-white hover:border-red-500 transition-all shadow-sm">None</button>
                                </div>
                              )}
                              <span className="text-sm font-semibold border-l border-slate-300 pl-4">{course.topics?.length || 0} topics</span>
                              <div className="w-8 h-8 rounded-full bg-white/80 shadow-sm flex items-center justify-center group-open:rotate-180 transition duration-300">
                                <Icon name="chevron-down" className="h-4 w-4 text-slate-600" />
                              </div>
                            </div>
                          </summary>
                          
                          <div className="flex flex-col divide-y divide-slate-200/50 bg-white/20 backdrop-blur-md">
                            {(course.topics || []).length === 0 ? (
                               <div className="p-8 text-center text-slate-500 font-medium">No topics or materials found for this course.</div>
                            ) : null}
                            {course.topics?.map(topic => {
                              const allTopicAtts = [];
                              topic.materials?.forEach(m => m.attachments?.forEach(a => allTopicAtts.push(a.id)));
                              const totalTopic = allTopicAtts.length;
                              const excludedTopic = allTopicAtts.filter(id => selection?.excluded_attachment_ids?.includes(id)).length;
                              const selectedTopic = totalTopic - excludedTopic;
                              const topicFullySelected = totalTopic > 0 && selectedTopic === totalTopic;
                              const topicFullyEmpty = totalTopic > 0 && selectedTopic === 0;

                              return (
                              <div key={topic.id} className="p-6 hover:bg-white/40 transition-colors">
                                <div className="flex items-center justify-between mb-4">
                                  <h4 className={`text-base font-bold flex items-center gap-2 ${topicFullyEmpty ? 'text-slate-400 line-through' : 'text-slate-800'}`}>
                                    <Icon name={topicFullySelected ? "check-circle" : "folder"} className={`w-5 h-5 ${topicFullySelected ? 'text-emerald-500' : 'text-slate-400'}`}/>
                                    {topic.title || 'General'}
                                  </h4>
                                  <div className="flex items-center gap-3">
                                    <span className={`text-[11px] font-bold px-2.5 py-1 rounded-md border ${topicFullySelected ? 'bg-emerald-500/10 text-emerald-600 border-emerald-500/20' : topicFullyEmpty ? 'bg-red-500/10 text-red-500 border-red-500/20' : 'bg-blue-500/10 text-blue-600 border-blue-500/20'}`}>
                                      {selectedTopic}/{totalTopic}
                                    </span>
                                    {totalTopic > 0 && (
                                      <div className="flex items-center gap-1.5">
                                        <button onClick={() => {
                                          setSelection(prev => {
                                            const excl = new Set(prev.excluded_attachment_ids || []);
                                            allTopicAtts.forEach(id => excl.delete(id));
                                            return { ...prev, excluded_attachment_ids: [...excl] };
                                          });
                                        }} className="px-2 py-1 text-[10px] uppercase font-bold rounded-md bg-white border border-slate-200 text-slate-500 hover:bg-emerald-500 hover:text-white hover:border-emerald-500 transition-all shadow-sm">All</button>
                                        <button onClick={() => {
                                          setSelection(prev => {
                                            const excl = new Set(prev.excluded_attachment_ids || []);
                                            allTopicAtts.forEach(id => excl.add(id));
                                            return { ...prev, excluded_attachment_ids: [...excl] };
                                          });
                                        }} className="px-2 py-1 text-[10px] uppercase font-bold rounded-md bg-white border border-slate-200 text-slate-500 hover:bg-red-500 hover:text-white hover:border-red-500 transition-all shadow-sm">None</button>
                                      </div>
                                    )}
                                  </div>
                                </div>
                                <div className="flex flex-col gap-4 pl-7">
                                  {Object.entries((topic.materials || []).reduce((acc, mat) => {
                                    const t = mat.type ? mat.type.toLowerCase() : 'other';
                                    if (!acc[t]) acc[t] = [];
                                    acc[t].push(mat);
                                    return acc;
                                  }, {})).map(([mType, mats], idx) => (
                                    <div key={mType} className={`flex flex-col gap-3 ${idx > 0 ? 'mt-4 pt-4 border-t border-slate-200/60' : ''}`}>
                                      <h5 className="text-[11px] items-center gap-2 uppercase font-extrabold text-slate-500 flex tracking-widest pl-1">
                                        {mType === 'assignment' ? <Icon name="clipboard-check" className="w-4 h-4 text-blue-400"/> :
                                         mType === 'material' ? <Icon name="book-open" className="w-4 h-4 text-emerald-400"/> :
                                         <Icon name="file-question" className="w-4 h-4 text-purple-400"/>}
                                        {mType}s
                                      </h5>
                                      {mats.map(mat => (
                                        <div key={mat.id} className={`rounded-xl border border-white/60 p-5 bg-white/70 shadow-sm border-l-4 hover:shadow-md transition-shadow ${mType === 'assignment' ? 'border-l-blue-500' : mType === 'material' ? 'border-l-emerald-500' : 'border-l-purple-500'}`}>
                                          <div className="flex items-center gap-3 mb-3">
                                            <span className="text-base font-bold text-slate-800">{mat.title}</span>
                                          </div>
                                          
                                          <div className="flex flex-col gap-2.5 pl-2">
                                            {mat.attachments?.map(att => {
                                              const isExcluded = selection?.excluded_attachment_ids?.includes(att.id);
                                              return (
                                              <label key={att.id} className={`flex items-center gap-4 text-sm p-2.5 rounded-xl transition-all duration-200 cursor-pointer border ${isExcluded ? 'opacity-60 bg-slate-100/50 border-transparent text-slate-400' : 'bg-white border-slate-200 hover:border-blue-300 hover:shadow-sm text-slate-800'}`}>
                                                <input 
                                                  type="checkbox" 
                                                  checked={!isExcluded} 
                                                  className="rounded-md border-slate-300 w-4.5 h-4.5 text-blue-600 focus:ring-blue-600 focus:ring-offset-0 disabled:opacity-50 cursor-pointer"
                                                  onChange={(e) => {
                                                    const checked = e.target.checked;
                                                    setSelection(prev => {
                                                      const ns = {...prev};
                                                      if (!ns.excluded_attachment_ids) ns.excluded_attachment_ids = [];
                                                      if (!checked) {
                                                        ns.excluded_attachment_ids.push(att.id);
                                                      } else {
                                                        ns.excluded_attachment_ids = ns.excluded_attachment_ids.filter(id => id !== att.id);
                                                      }
                                                      return ns;
                                                    });
                                                  }}
                                                />
                                                <div className={`flex items-center justify-center w-8 h-8 rounded-lg ${isExcluded ? 'bg-slate-200/50 text-slate-400' : 'bg-blue-50 text-blue-600'}`}>
                                                  <Icon name={att.provider === 'youtube' ? 'youtube' : att.provider === 'form' ? 'form-input' : 'file-text'} className="h-4 w-4" />
                                                </div>
                                                <span className={`truncate flex-1 font-semibold ${isExcluded ? 'line-through' : ''}`}>{att.filename}</span>
                                                <span className="text-[11px] text-slate-500 font-bold bg-slate-100/80 px-2.5 py-1 flex items-center justify-center rounded-md border border-slate-200/60 tracking-tight">{bytesToSize(att.size_bytes)}</span>
                                              </label>
                                            )})}
                                            {(!mat.attachments || mat.attachments.length === 0) && (
                                              <span className="text-xs text-slate-400 font-medium italic bg-white/50 rounded-lg p-3 text-center border border-dashed border-slate-300">No attachments provided</span>
                                            )}
                                          </div>
                                        </div>
                                      ))}
                                    </div>
                                  ))}
                                  {(!topic.materials || topic.materials.length === 0) && (
                                      <span className="text-xs text-slate-400 italic">No materials in this topic.</span>
                                  )}
                                </div>
                              </div>
                            )})}
                          </div>
                        </details>
                      )})}
                    </div>
                  </div>
                )}

                {activeTab === 'settings' && (
                  <div className="flex flex-col gap-6 animate-in fade-in zoom-in-95 duration-300">
                    <h2 className="text-3xl font-bold text-slate-800 tracking-tight pb-2">System Details</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="glass-card rounded-3xl p-8 flex flex-col gap-4 hover:shadow-lg transition-shadow border-white/60">
                        <div className="flex items-center gap-4">
                           <div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-blue-100 to-blue-50 text-blue-600 border border-blue-200">
                             <Icon name="folder-tree" className="h-6 w-6" />
                           </div>
                           <h3 className="font-extrabold text-slate-800 text-xl">System Layout</h3>
                        </div>
                        <p className="text-base text-slate-600 leading-relaxed font-medium mt-2">
                           All your data stays entirely on your local machine.
                           By default, everything is saved directly into the <code className="bg-slate-100/80 px-2 py-0.5 rounded border border-slate-200">./output/</code> folder in this project's directory.
                        </p>
                        <div className="mt-auto pt-5 border-t border-slate-200/60">
                          <ul className="text-sm font-mono flex flex-col gap-3 font-semibold text-slate-600">
                            <li className="flex items-center gap-3"><span className="p-1.5 bg-slate-100 rounded-md border border-slate-200"><Icon name="file-json" className="h-4 w-4"/></span> ./output/master_index.json</li>
                            <li className="flex items-center gap-3"><span className="p-1.5 bg-slate-100 rounded-md border border-slate-200"><Icon name="database" className="h-4 w-4"/></span> ./database/classroom.db</li>
                            <li className="flex items-center gap-3"><span className="p-1.5 bg-slate-100 rounded-md border border-slate-200"><Icon name="files" className="h-4 w-4"/></span> ./output/courses/*</li>
                          </ul>
                        </div>
                      </div>

                      <div className="glass-card rounded-3xl p-8 flex flex-col gap-4 hover:shadow-lg transition-shadow border-white/60">
                        <div className="flex items-center gap-4">
                           <div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-emerald-100 to-emerald-50 text-emerald-600 border border-emerald-200">
                             <Icon name="shield-check" className="h-6 w-6" />
                           </div>
                           <h3 className="font-extrabold text-slate-800 text-xl">Smart Downloading</h3>
                        </div>
                        <p className="text-base text-slate-600 leading-relaxed font-medium mt-2">
                          The downloader remembers what it has already grabbed using an intelligent caching mechanism.
                        </p>
                        <p className="text-base text-slate-600 leading-relaxed font-medium bg-emerald-50/50 p-4 rounded-xl border border-emerald-100">
                          If you restart the downloader, it will automatically skip files it has already saved locally. This saves significant time and bandwidth!
                        </p>
                      </div>

                      <div className="glass-card rounded-3xl p-8 flex flex-col gap-4 hover:shadow-lg transition-shadow md:col-span-2 border-white/60">
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-4">
                            <div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-orange-100 to-orange-50 text-orange-600 border border-orange-200">
                              <Icon name="hard-drive" className="h-6 w-6" />
                            </div>
                            <h3 className="font-extrabold text-slate-800 text-xl">Recently Downloaded Files</h3>
                          </div>
                          <span className="text-sm font-bold text-slate-600 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm">{dbFiles?.filter(f => f.status === 'complete').length || 0} items locally</span>
                        </div>
                        <div className="mt-4 border border-white/60 rounded-2xl bg-white/50 backdrop-blur-sm overflow-hidden shadow-inner">
                          <div className="max-h-[400px] overflow-y-auto w-full text-sm font-mono whitespace-nowrap">
                            <table className="w-full text-left border-collapse">
                              <thead className="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 shadow-sm z-10">
                                <tr>
                                  <th className="px-5 py-4 font-bold text-slate-700 w-1/4 uppercase tracking-wider text-xs">Course</th>
                                  <th className="px-5 py-4 font-bold text-slate-700 w-1/3 uppercase tracking-wider text-xs">File Name</th>
                                  <th className="px-5 py-4 font-bold text-slate-700 uppercase tracking-wider text-xs">Local Path</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-slate-200/60 font-medium">
                                {!dbFiles || dbFiles.filter(f => f.status === 'complete').length === 0 ? (
                                  <tr><td colSpan="3" className="px-6 py-12 text-center text-slate-500 italic bg-white/40">No files downloaded yet. Start downloading to see them here!</td></tr>
                                ) : dbFiles.filter(f => f.status === 'complete').map(f => (
                                  <tr key={f.id} className="hover:bg-white/80 transition-colors">
                                    <td className="px-5 py-3 text-slate-600 truncate max-w-[200px]" title={f.course_name}>{f.course_name}</td>
                                    <td className="px-5 py-3 font-semibold text-slate-800 truncate max-w-[300px]" title={f.filename}>{f.filename}</td>
                                    <td className="px-5 py-3 text-slate-500 truncate max-w-[400px]" title={f.local_path}>{f.local_path}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>

                      <div className="rounded-3xl border border-red-200 bg-gradient-to-br from-red-50 to-white p-8 shadow-sm flex flex-col gap-4 md:col-span-2 relative overflow-hidden group">
                        <div className="absolute -right-10 -bottom-10 opacity-5 group-hover:scale-110 transition-transform duration-500"><Icon name="alert-triangle" className="w-64 h-64 text-red-500"/></div>
                        <div className="flex items-center gap-4 relative z-10">
                           <div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-red-100 text-red-600 border border-red-200">
                             <Icon name="alert-triangle" className="h-6 w-6" />
                           </div>
                           <h3 className="font-extrabold text-red-800 text-xl">Danger Zone</h3>
                        </div>
                        <p className="text-base text-red-700 leading-relaxed font-medium mt-2 max-w-4xl relative z-10">
                          Need to test the downloader from scratch? You can factory reset the local database. 
                          This deletes the index of what has been downloaded, but it <b className="font-extrabold bg-red-100 px-1 rounded">does not</b> delete your actual files on disk.
                        </p>
                        <div className="mt-4 relative z-10">
                          <button onClick={handleResetDatabase} className="flex items-center gap-2 rounded-xl bg-red-600 px-6 py-3 font-bold text-white shadow-md shadow-red-500/20 hover:bg-red-700 transition-all active:scale-95 hover:shadow-lg">
                            <Icon name="trash-2" className="w-4 h-4"/> Factory Reset Database
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
