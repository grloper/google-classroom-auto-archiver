<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classroom Downloader Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { background-color: #f8fafc; color: #0f172a; }
    /* Hide scrollbar for clean ui */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function Icon({ name, className = "" }) {
      const svgRef = React.useRef(null);
      
      useEffect(() => {
        if (svgRef.current && window.lucide) {
          window.lucide.createIcons({
            icons: { [name]: window.lucide.icons[name] },
            attrs: { class: className },
            nameAttr: 'data-lucide'
          });
        }
      }, [name, className]);

      return <i ref={svgRef} data-lucide={name}></i>;
    }

    function bytesToSize(bytes) {
      if (!bytes) return 'Unknown';
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
      if (bytes === 0) return '0 Byte';
      const i = parseInt(Math.floor(Math.log(bytes) / Math.log(1024)));
      return Math.round(bytes / Math.pow(1024, i), 2) + ' ' + sizes[i];
    }

    const API_BASE = 'http://127.0.0.1:4317';

    function App() {
      const [apiStatus, setApiStatus] = useState({ online: false, counts: null });
      const [plan, setPlan] = useState(null);
      const [selection, setSelection] = useState(null);
      const [dbFiles, setDbFiles] = useState([]);
      const [coursesData, setCoursesData] = useState(null);
      const [selectedCourseId, setSelectedCourseId] = useState(null);
      const [activeTab, setActiveTab] = useState('classroom');
      const [loading, setLoading] = useState(true);

      const refreshData = async (silent = false) => {
        if (!silent) setLoading(true);
        try {
          const resHealth = await fetch(`${API_BASE}/health`);
          if (resHealth.ok) {
            const data = await resHealth.json();
            setApiStatus({ online: true, counts: data.counts });
          }
          
          const resPlan = await fetch(`${API_BASE}/plan`);
          if (resPlan.ok) {
            setPlan(await resPlan.json());
          }

          const resSel = await fetch(`${API_BASE}/selection`);
          if (resSel.ok) {
            setSelection(await resSel.json() || { selection_mode: 'implicit', excluded_attachment_ids: [] });
          }

          const resFiles = await fetch(`${API_BASE}/db/files`);
          if (resFiles.ok) {
            setDbFiles(await resFiles.json() || []);
          }

          const resCourses = await fetch(`${API_BASE}/courses`);
          if (resCourses.ok) {
            setCoursesData(await resCourses.json());
          }
        } catch (e) {
          setApiStatus({ online: false, counts: null });
          console.error("API not available", e);
        }
        if (!silent) setLoading(false);
      };

      useEffect(() => {
        refreshData();
        const poller = setInterval(() => {
          refreshData(true);
        }, 3000);
        return () => clearInterval(poller);
      }, []);

      useEffect(() => {
        if (coursesData?.courses?.length > 0 && !selectedCourseId) {
          setSelectedCourseId(coursesData.courses[0].id);
        }
      }, [coursesData, selectedCourseId]);

      const getStats = useMemo(() => {
        if (!plan) return { courses: 0, items: 0, bytes: 0 };
        let items = 0, bytes = 0;
        plan.courses?.forEach(c => {
          c.topics?.forEach(t => {
            t.materials?.forEach(m => {
              m.attachments?.forEach(a => {
                items++;
                bytes += (a.size_bytes || 0);
              });
            });
          });
        });
        return { courses: plan.courses?.length || 0, items, bytes };
      }, [plan]);

      const handleTriggerRefreshPlan = async () => {
        await fetch(`${API_BASE}/plan/refresh`, { method: 'POST' });
        alert('Crawl command sent to sync Classroom. Monitor terminal for metadata generation progress, then refresh this page.');
      };

      const handleSaveSelection = async () => {
        if (!selection) return;

        const excludedCount = selection.excluded_attachment_ids?.length || 0;
        const totalCount = getStats.items;
        const includedCount = totalCount - excludedCount;

        const confirmed = window.confirm(
          `Are you sure you want to save this download plan?\n\n` +
          `✅ Included: ${includedCount} items\n` +
          `❌ Excluded: ${excludedCount} items\n\n` +
          `Excluded items will be skipped during the next download cycle. You can change this at any time.`
        );

        if (!confirmed) return;

        const payloadToSave = { ...selection, selection_mode: 'implicit' };

        await fetch(`${API_BASE}/selection`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payloadToSave)
        });
        
        const btn1 = document.getElementById('save-btn-top');
        const btn2 = document.getElementById('save-btn-top-2');
        
        [btn1, btn2].forEach(btn => {
          if(!btn) return;
          const origText = btn.innerHTML;
          btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Saved Successfully!`;
          btn.classList.add('bg-emerald-600', 'hover:bg-emerald-700');
          btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
          setTimeout(() => {
            btn.innerHTML = origText;
            btn.classList.remove('bg-emerald-600', 'hover:bg-emerald-700');
            btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
          }, 2500);
        });
      };

      const handleStartDownload = async () => {
        await fetch(`${API_BASE}/downloads/selected`, { method: 'POST' });
        alert('Download process activated. See terminal for real-time progress constraints.');
      };

      const handleResetDatabase = async () => {
        const confirmed = window.confirm(
          '⚠️ WARNING: This will completely wipe all local database metadata, including download history, tracked courses, and selection plans.\n\n' +
          'It will NOT delete your downloaded files on disk, but the system will forget it downloaded them, so a future run may redownload them.\n\n' +
          'Are you absolutely sure you want to factory reset the local database?'
        );
        if (!confirmed) return;
        
        try {
          const res = await fetch(`${API_BASE}/db/reset`, { method: 'DELETE' });
          if (res.ok) {
            alert('Database has been completely erased.');
            refreshData(); // Force refresh to show empty state
          } else {
            alert('Failed to reset database.');
          }
        } catch (e) {
          console.error(e);
          alert('Error communicating with the engine.');
        }
      };

      if (loading && !plan) {
        return <div className="flex h-screen items-center justify-center text-xl text-slate-500 gap-3"><Icon name="loader-2" className="animate-spin" /> Initializing Workspace...</div>;
      }

      return (
        <div className="flex h-screen flex-col overflow-hidden bg-slate-50 font-sans">
          <header className="flex h-16 shrink-0 items-center justify-between border-b bg-white px-6 shadow-sm">
            <div className="flex items-center gap-3">
              <div className="flex h-10 w-10 items-center justify-center rounded-lg bg-blue-600 shadow-sm text-white">
                <Icon name="download-cloud" className="h-5 w-5" />
              </div>
              <h1 className="text-xl font-bold tracking-tight text-slate-900">Classroom Downloader</h1>
            </div>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1.5 text-sm font-medium border">
                <span className={`h-2.5 w-2.5 rounded-full shadow-sm ${apiStatus.online ? 'bg-emerald-500' : 'bg-red-500 animate-pulse'}`}></span>
                {apiStatus.online ? 'Engine Connected' : 'Engine Offline'}
              </div>
            </div>
          </header>

          <main className="flex flex-1 overflow-hidden">
            <aside className="w-64 border-r bg-white p-4 flex flex-col gap-2 shadow-[2px_0_10px_-5px_rgba(0,0,0,0.1)] z-10">
              <div className="text-xs font-bold uppercase tracking-wider text-slate-400 px-3 mb-2 mt-2">DASHBOARD</div>
              <div 
                className={`cursor-pointer rounded-md px-3 py-2.5 font-medium flex gap-3 items-center transition-colors ${activeTab === 'classroom' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                onClick={() => setActiveTab('classroom')}
              >
                <Icon name="presentation" className="w-4 h-4" /> My Classroom
              </div>
              <div 
                className={`cursor-pointer rounded-md px-3 py-2.5 font-medium flex gap-3 items-center transition-colors ${activeTab === 'overview' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                onClick={() => setActiveTab('overview')}
              >
                <Icon name="layout-dashboard" className="w-4 h-4" /> Overview
              </div>
              <div 
                className={`cursor-pointer rounded-md px-3 py-2.5 font-medium flex gap-3 items-center transition-colors ${activeTab === 'courses' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                onClick={() => setActiveTab('courses')}
              >
                <Icon name="list-tree" className="w-4 h-4" /> Download Plan
              </div>
              <div 
                className={`cursor-pointer rounded-md px-3 py-2.5 font-medium flex gap-3 items-center transition-colors ${activeTab === 'settings' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                onClick={() => setActiveTab('settings')}
              >
                <Icon name="settings" className="w-4 h-4" /> System Details
              </div>
            </aside>

            <section className="flex-1 overflow-y-auto bg-slate-50/50 p-8">
              <div className="max-w-5xl mx-auto space-y-6">
                
                {activeTab === 'classroom' && coursesData && (
                  <div className="flex flex-col gap-6 animate-in fade-in zoom-in-95 duration-200">
                    <div className="flex items-center justify-between border-b pb-4">
                      <div>
                        <h2 className="text-2xl font-bold text-slate-800 tracking-tight">My Classroom</h2>
                        <p className="text-sm text-slate-500 mt-1">View your downloaded materials and assignments. Click files to open them instantly.</p>
                      </div>
                      <select 
                        className="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium shadow-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                        value={selectedCourseId || ''}
                        onChange={(e) => setSelectedCourseId(e.target.value)}
                      >
                        <option value="" disabled>Select a Course</option>
                        {coursesData.courses?.map(c => (
                          <option key={c.id} value={c.id}>{c.name}</option>
                        ))}
                      </select>
                    </div>

                    <div className="flex flex-col gap-8">
                      {coursesData.courses?.filter(c => c.id === selectedCourseId).map(course => (
                        <div key={course.id} className="flex flex-col gap-8">
                          {/* Course Header */}
                          <div className="rounded-3xl bg-gradient-to-br from-blue-700 via-blue-600 to-indigo-800 p-10 text-white shadow-lg relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-10">
                              <Icon name="book-open" className="w-48 h-48" />
                            </div>
                            <div className="relative z-10">
                              <h1 className="text-4xl font-bold mb-3 tracking-tight">{course.name}</h1>
                              <p className="text-blue-100 font-medium text-lg flex items-center gap-2">
                                <Icon name="user" className="w-5 h-5"/> {course.teacher}
                              </p>
                              {course.section && <p className="text-sm text-blue-200 mt-2 bg-black/20 inline-block px-3 py-1 rounded-full">{course.section}</p>}
                            </div>
                          </div>

                          {/* Topics */}
                          <div className="flex flex-col gap-10">
                            {course.topics?.map(topic => (
                              <div key={topic.id} className="flex flex-col gap-5">
                                <h2 className="text-2xl font-bold text-slate-800 border-b-2 border-blue-500/20 pb-3 flex items-center gap-3">
                                  <Icon name="folder" className="w-6 h-6 text-blue-500"/> {topic.title || 'Stream / General'}
                                </h2>
                                
                                <div className="grid grid-cols-1 gap-5">
                                  {topic.materials?.map(mat => {
                                    const mType = mat.type ? mat.type.toLowerCase() : 'other';
                                    const isAssignment = mType === 'assignment';
                                    return (
                                      <div key={mat.id} className={`flex gap-5 p-6 rounded-2xl border bg-white shadow-sm hover:shadow-md transition-all ${isAssignment ? 'border-l-4 border-l-blue-500 border-slate-200' : 'border-l-4 border-l-emerald-500 border-slate-200'}`}>
                                        <div className={`mt-1 flex h-12 w-12 shrink-0 items-center justify-center rounded-full ${isAssignment ? 'bg-blue-100 text-blue-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                          <Icon name={isAssignment ? 'clipboard-check' : 'book-open'} className="w-6 h-6"/>
                                        </div>
                                        <div className="flex-1 flex flex-col gap-3 min-w-0">
                                          <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-2">
                                            <div>
                                              <h3 className="font-bold text-xl text-slate-900">{mat.title}</h3>
                                              <div className="flex gap-2 items-center mt-1.5">
                                                <span className={`text-[11px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider ${isAssignment ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600'}`}>{mType}</span>
                                                {mat.due_date && <span className="text-[11px] font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded-full border border-rose-100 flex items-center gap-1"><Icon name="clock" className="w-3 h-3"/> Due: {mat.due_date}</span>}
                                              </div>
                                            </div>
                                          </div>
                                          {mat.description && <p className="text-sm text-slate-600 whitespace-pre-wrap bg-slate-50 p-4 rounded-xl border border-slate-100 mt-2">{mat.description}</p>}
                                          
                                          {/* Attachments Grid */}
                                          {mat.attachments?.length > 0 && (
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mt-4 pt-4 border-t border-slate-100">
                                              {mat.attachments.map(att => {
                                                const isDownloaded = att.status === 'complete' && att.local_path;
                                                return (
                                                  <div key={att.id} className={`flex items-center gap-3 p-3 rounded-xl border ${isDownloaded ? 'border-slate-200 bg-white hover:border-blue-400 hover:shadow-md cursor-pointer hover:bg-blue-50/30' : 'border-dashed border-slate-200 bg-slate-50 opacity-60'} transition-all`}
                                                    onClick={() => {
                                                      if (isDownloaded) {
                                                        fetch(`${API_BASE}/open`, {
                                                          method: 'POST',
                                                          headers: { 'Content-Type': 'application/json' },
                                                          body: JSON.stringify({ id: att.id })
                                                        }).then(async res => {
                                                          if (!res.ok) {
                                                            const data = await res.json().catch(() => ({}));
                                                            alert(`Failed to open file: ${data.error || res.statusText}`);
                                                          }
                                                        }).catch(err => alert('Failed to open file.'));
                                                      }
                                                    }}
                                                  >
                                                    <div className={`flex items-center justify-center w-10 h-10 rounded-lg ${isDownloaded ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-400'}`}>
                                                      <Icon name={att.provider === 'youtube' ? 'youtube' : att.provider === 'form' ? 'form-input' : 'file-text'} className="h-5 w-5" />
                                                    </div>
                                                    <div className="flex-1 min-w-0 flex flex-col justify-center">
                                                      <span className={`truncate text-sm font-semibold ${isDownloaded ? 'text-slate-900' : 'text-slate-500'}`} title={att.filename}>{att.filename}</span>
                                                      <span className={`text-[11px] font-medium flex items-center gap-1 mt-0.5 ${isDownloaded ? 'text-blue-600' : 'text-slate-400'}`}>
                                                        {isDownloaded ? <><Icon name="external-link" className="w-3 h-3"/> Click to open</> : 'Not downloaded'}
                                                      </span>
                                                    </div>
                                                  </div>
                                                );
                                              })}
                                            </div>
                                          )}
                                        </div>
                                      </div>
                                    );
                                  })}
                                  {(!topic.materials || topic.materials.length === 0) && (
                                    <div className="text-sm text-slate-500 italic p-6 bg-slate-50 rounded-xl border border-dashed border-slate-200 flex items-center gap-3">
                                      <Icon name="inbox" className="w-5 h-5 text-slate-400"/> No items posted in this topic yet.
                                    </div>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === 'overview' && (
                  <div className="flex flex-col gap-6 animate-in fade-in zoom-in-95 duration-200">
                    <div className="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
                      <h2 className="mb-4 text-xl font-bold flex items-center gap-2"><Icon name="info" className="w-6 h-6 text-blue-500"/> Getting Started</h2>
                      <p className="text-slate-600 mb-8 text-sm leading-relaxed max-w-3xl">
                        Welcome! This dashboard lets you manage what you want to download from your Google Classroom. 
                        It connects securely to your local database to view all discovered courses, topics, and materials.
                        You can selectively exclude files before downloading.
                      </p>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="rounded-xl border border-slate-100 bg-gradient-to-b from-slate-50 to-white p-5 shadow-sm">
                          <div className="flex items-center gap-3 mb-2">
                            <div className="p-2 bg-blue-100 rounded-lg text-blue-600"><Icon name="library" className="w-4 h-4"/></div>
                            <div className="text-sm font-medium text-slate-500">Available Courses</div>
                          </div>
                          <div className="text-3xl font-bold text-slate-900">{getStats.courses}</div>
                        </div>
                        <div className="rounded-xl border border-slate-100 bg-gradient-to-b from-slate-50 to-white p-5 shadow-sm">
                          <div className="flex items-center gap-3 mb-2">
                            <div className="p-2 bg-purple-100 rounded-lg text-purple-600"><Icon name="paperclip" className="w-4 h-4"/></div>
                            <div className="text-sm font-medium text-slate-500">Total Available Items</div>
                          </div>
                          <div className="text-3xl font-bold text-slate-900">{getStats.items}</div>
                        </div>
                        <div className="rounded-xl border border-slate-100 bg-gradient-to-b from-slate-50 to-white p-5 shadow-sm">
                          <div className="flex items-center gap-3 mb-2">
                            <div className="p-2 bg-emerald-100 rounded-lg text-emerald-600"><Icon name="hard-drive" className="w-4 h-4"/></div>
                            <div className="text-sm font-medium text-slate-500">Total File Size (Est.)</div>
                          </div>
                          <div className="text-3xl font-bold text-slate-900">{bytesToSize(getStats.bytes)}</div>
                        </div>
                      </div>
                    </div>
                    
                    <div className="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
                      <h3 className="font-bold flex items-center gap-2 mb-4 text-slate-800"><Icon name="play-circle" className="w-5 h-5 text-amber-500"/> Actions</h3>
                      <div className="flex flex-wrap gap-4">
                        <button onClick={handleTriggerRefreshPlan} className="flex items-center gap-2 rounded-lg bg-white border border-slate-300 px-5 py-2.5 font-medium text-slate-700 shadow-sm hover:bg-slate-50 transition-all active:scale-95">
                          <Icon name="refresh-cw" className="w-4 h-4"/> Sync Classroom Data
                        </button>
                        <button id="save-btn-top" onClick={handleSaveSelection} className="flex items-center gap-2 rounded-lg bg-blue-600 px-5 py-2.5 font-medium text-white shadow-sm hover:bg-blue-700 hover:shadow transition-all active:scale-95">
                          <Icon name="save" className="w-4 h-4"/> Save Download Plan
                        </button>
                        <button onClick={handleStartDownload} className="flex items-center gap-2 rounded-lg bg-emerald-600 px-5 py-2.5 font-medium text-white shadow-sm hover:bg-emerald-700 hover:shadow-md transition-all active:scale-95">
                          <Icon name="download" className="w-4 h-4"/> Start Downloading
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'courses' && plan && (
                  <div className="flex flex-col gap-6 animate-in fade-in zoom-in-95 duration-200">
                    <div className="flex items-center justify-between border-b pb-4">
                      <div>
                        <h2 className="text-2xl font-bold text-slate-800 tracking-tight">Select Files to Download</h2>
                        <p className="text-sm text-slate-500 mt-1">Review the materials below. Uncheck anything you don't want to download.</p>
                      </div>
                      <div className="flex items-center gap-3">
                        <button 
                          onClick={() => setSelection(prev => ({ ...prev, excluded_attachment_ids: [] }))} 
                          className="flex items-center gap-2 rounded-lg bg-white border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 transition-all"
                        >
                          <Icon name="check-square" className="w-4 h-4"/> Select All
                        </button>
                        <button 
                           onClick={() => {
                             const allIds = [];
                             plan.courses?.forEach(c => c.topics?.forEach(t => t.materials?.forEach(m => m.attachments?.forEach(a => allIds.push(a.id)))));
                             setSelection(prev => ({ ...prev, excluded_attachment_ids: allIds }));
                           }} 
                           className="flex items-center gap-2 rounded-lg bg-white border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 transition-all"
                        >
                          <Icon name="x-square" className="w-4 h-4"/> Deselect All
                        </button>
                        <button id="save-btn-top-2" onClick={handleSaveSelection} className="flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700 transition-all">
                          <Icon name="save" className="w-4 h-4"/> Save Plan
                        </button>
                      </div>
                    </div>
                    
                    <div className="flex flex-col gap-4">
                      {plan.courses?.map(course => {
                        const allCourseAtts = [];
                        course.topics?.forEach(t => t.materials?.forEach(m => m.attachments?.forEach(a => allCourseAtts.push(a.id))));
                        const totalCourse = allCourseAtts.length;
                        const excludedCourse = allCourseAtts.filter(id => selection?.excluded_attachment_ids?.includes(id)).length;
                        const selectedCourse = totalCourse - excludedCourse;
                        const courseFullySelected = totalCourse > 0 && selectedCourse === totalCourse;
                        const courseFullyEmpty = totalCourse > 0 && selectedCourse === 0;

                        return (
                        <details key={course.id} className="group rounded-xl border border-slate-200 bg-white shadow-sm transition-all overflow-hidden [&_summary::-webkit-details-marker]:hidden">
                          <summary className="flex cursor-pointer items-center justify-between p-5 bg-slate-50 hover:bg-slate-100/80 transition-colors border-b border-transparent group-open:border-slate-200">
                            <div className="flex items-center gap-4">
                              <h3 className={`font-bold text-lg ${courseFullyEmpty ? 'text-slate-400 line-through' : 'text-slate-900'}`}>{course.name}</h3>
                              <span className="rounded-full bg-white border border-slate-200 px-2.5 py-0.5 text-xs font-medium text-slate-600 shadow-sm">{course.teacher}</span>
                            </div>
                            <div className="flex items-center gap-3 text-slate-400">
                              <span className={`text-[11px] font-bold px-2 py-0.5 rounded-full border shadow-sm ${courseFullySelected ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : courseFullyEmpty ? 'bg-red-50 text-red-400 border-red-100' : 'bg-blue-50 text-blue-700 border-blue-200'}`}>
                                {selectedCourse} / {totalCourse} items
                              </span>
                              {totalCourse > 0 && (
                                <div className="flex items-center gap-1 mr-2 opacity-60 hover:opacity-100 transition-opacity">
                                  <button onClick={(e) => {
                                    e.preventDefault(); e.stopPropagation();
                                    setSelection(prev => {
                                      const excl = new Set(prev.excluded_attachment_ids || []);
                                      allCourseAtts.forEach(id => excl.delete(id));
                                      return { ...prev, excluded_attachment_ids: [...excl] };
                                    });
                                  }} className="px-2 py-1 text-[10px] uppercase font-bold rounded bg-slate-200 text-slate-600 hover:bg-emerald-500 hover:text-white transition">All</button>
                                  <button onClick={(e) => {
                                    e.preventDefault(); e.stopPropagation();
                                    setSelection(prev => {
                                      const excl = new Set(prev.excluded_attachment_ids || []);
                                      allCourseAtts.forEach(id => excl.add(id));
                                      return { ...prev, excluded_attachment_ids: [...excl] };
                                    });
                                  }} className="px-2 py-1 text-[10px] uppercase font-bold rounded bg-slate-200 text-slate-600 hover:bg-red-500 hover:text-white transition">None</button>
                                </div>
                              )}
                              <span className="text-xs font-medium border-l pl-3 border-slate-200">{course.topics?.length || 0} topics</span>
                              <div className="w-8 h-8 rounded-full bg-white border shadow-sm flex items-center justify-center group-open:rotate-180 transition duration-300">
                                <Icon name="chevron-down" className="h-4 w-4 text-slate-600" />
                              </div>
                            </div>
                          </summary>
                          
                          <div className="flex flex-col divide-y divide-slate-100 bg-white">
                            {(course.topics || []).length === 0 ? (
                               <div className="p-8 text-center text-slate-500 text-sm">No topics or materials found for this course.</div>
                            ) : null}
                            {course.topics?.map(topic => {
                              const allTopicAtts = [];
                              topic.materials?.forEach(m => m.attachments?.forEach(a => allTopicAtts.push(a.id)));
                              const totalTopic = allTopicAtts.length;
                              const excludedTopic = allTopicAtts.filter(id => selection?.excluded_attachment_ids?.includes(id)).length;
                              const selectedTopic = totalTopic - excludedTopic;
                              const topicFullySelected = totalTopic > 0 && selectedTopic === totalTopic;
                              const topicFullyEmpty = totalTopic > 0 && selectedTopic === 0;

                              return (
                              <div key={topic.id} className="p-5 hover:bg-slate-50/50 transition-colors">
                                <div className="flex items-center justify-between mb-3">
                                  <h4 className={`text-sm font-bold flex items-center gap-2 ${topicFullyEmpty ? 'text-slate-400 line-through' : 'text-slate-800'}`}>
                                    <Icon name={topicFullySelected ? "check-circle" : "folder"} className={`w-4 h-4 ${topicFullySelected ? 'text-emerald-500' : 'text-slate-400'}`}/>
                                    {topic.title || 'General'}
                                  </h4>
                                  <div className="flex items-center gap-3">
                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${topicFullySelected ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : topicFullyEmpty ? 'bg-red-50 text-red-400 border-red-100' : 'bg-blue-50 text-blue-600 border-blue-200'}`}>
                                      {selectedTopic}/{totalTopic}
                                    </span>
                                    {totalTopic > 0 && (
                                      <div className="flex items-center gap-1">
                                        <button onClick={() => {
                                          setSelection(prev => {
                                            const excl = new Set(prev.excluded_attachment_ids || []);
                                            allTopicAtts.forEach(id => excl.delete(id));
                                            return { ...prev, excluded_attachment_ids: [...excl] };
                                          });
                                        }} className="px-1.5 py-0.5 text-[10px] uppercase font-bold rounded bg-slate-100 text-slate-500 hover:bg-emerald-100 hover:text-emerald-700 transition">All</button>
                                        <button onClick={() => {
                                          setSelection(prev => {
                                            const excl = new Set(prev.excluded_attachment_ids || []);
                                            allTopicAtts.forEach(id => excl.add(id));
                                            return { ...prev, excluded_attachment_ids: [...excl] };
                                          });
                                        }} className="px-1.5 py-0.5 text-[10px] uppercase font-bold rounded bg-slate-100 text-slate-500 hover:bg-red-100 hover:text-red-700 transition">None</button>
                                      </div>
                                    )}
                                  </div>
                                </div>
                                <div className="flex flex-col gap-3 pl-6">
                                  {Object.entries((topic.materials || []).reduce((acc, mat) => {
                                    const t = mat.type ? mat.type.toLowerCase() : 'other';
                                    if (!acc[t]) acc[t] = [];
                                    acc[t].push(mat);
                                    return acc;
                                  }, {})).map(([mType, mats], idx) => (
                                    <div key={mType} className={`flex flex-col gap-3 ${idx > 0 ? 'mt-4 pt-4 border-t border-slate-100' : ''}`}>
                                      <h5 className="text-[10px] items-center gap-1.5 uppercase font-bold text-slate-400 flex tracking-widest pl-1">
                                        {mType === 'assignment' ? <Icon name="clipboard-check" className="w-3.5 h-3.5"/> :
                                         mType === 'material' ? <Icon name="book-open" className="w-3.5 h-3.5"/> :
                                         <Icon name="file-question" className="w-3.5 h-3.5"/>}
                                        {mType}s
                                      </h5>
                                      {mats.map(mat => (
                                        <div key={mat.id} className={`rounded-lg border p-4 bg-white shadow-sm border-l-4 ${mType === 'assignment' ? 'border-l-blue-500 border-slate-200' : mType === 'material' ? 'border-l-emerald-500 border-slate-200' : 'border-l-purple-500 border-slate-200'}`}>
                                          <div className="flex items-center gap-3 mb-3">
                                            <span className="text-sm font-semibold text-slate-800">{mat.title}</span>
                                          </div>
                                          
                                          <div className="flex flex-col gap-2 pl-2">
                                            {mat.attachments?.map(att => {
                                              const isExcluded = selection?.excluded_attachment_ids?.includes(att.id);
                                              return (
                                              <label key={att.id} className={`flex items-center gap-3 text-sm p-2 rounded-md transition-colors cursor-pointer border border-transparent ${isExcluded ? 'opacity-60 bg-red-50/30 line-through text-slate-400' : 'hover:bg-slate-50 text-slate-700'}`}>
                                                <input 
                                                  type="checkbox" 
                                                  checked={!isExcluded} 
                                                  className="rounded border-slate-300 w-4 h-4 text-blue-600 focus:ring-blue-600 focus:ring-offset-0 disabled:opacity-50"
                                                  onChange={(e) => {
                                                    const checked = e.target.checked;
                                                    setSelection(prev => {
                                                      const ns = {...prev};
                                                      if (!ns.excluded_attachment_ids) ns.excluded_attachment_ids = [];
                                                      if (!checked) {
                                                        ns.excluded_attachment_ids.push(att.id);
                                                      } else {
                                                        ns.excluded_attachment_ids = ns.excluded_attachment_ids.filter(id => id !== att.id);
                                                      }
                                                      return ns;
                                                    });
                                                  }}
                                                />
                                                <div className="flex items-center justify-center w-6 h-6 rounded bg-slate-100 text-slate-500">
                                                  <Icon name={att.provider === 'youtube' ? 'youtube' : att.provider === 'form' ? 'form-input' : 'file-text'} className="h-3.5 w-3.5" />
                                                </div>
                                                <span className="truncate flex-1 font-medium">{att.filename}</span>
                                                <span className="text-xs text-slate-400 font-mono bg-slate-50 px-2 py-1 flex items-center justify-center rounded border border-slate-100 tracking-tight">{bytesToSize(att.size_bytes)}</span>
                                              </label>
                                            )})}
                                            {(!mat.attachments || mat.attachments.length === 0) && (
                                              <span className="text-xs text-slate-400 italic bg-slate-50 rounded p-2 text-center border border-dashed border-slate-200">No attachments provided</span>
                                            )}
                                          </div>
                                        </div>
                                      ))}
                                    </div>
                                  ))}
                                  {(!topic.materials || topic.materials.length === 0) && (
                                      <span className="text-xs text-slate-400 italic">No materials in this topic.</span>
                                  )}
                                </div>
                              </div>
                            )})}
                          </div>
                        </details>
                      )})}
                    </div>
                  </div>
                )}

                {activeTab === 'settings' && (
                  <div className="flex flex-col gap-6 animate-in fade-in zoom-in-95 duration-200">
                    <h2 className="text-2xl font-bold text-slate-800 tracking-tight border-b pb-4">System Details</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="rounded-xl border border-slate-200 bg-white p-6 shadow-sm flex flex-col gap-3 hover:shadow-md transition-shadow">
                        <div className="flex items-center gap-3">
                           <div className="flex h-10 w-10 items-center justify-center rounded-lg bg-blue-100 text-blue-600">
                             <Icon name="folder-tree" className="h-5 w-5" />
                           </div>
                           <h3 className="font-bold text-slate-800 text-lg">System Layout</h3>
                        </div>
                        <p className="text-sm text-slate-600 leading-relaxed mt-2">
                           All your data stays entirely on your local machine.
                           By default, everything is saved directly into the <code>./output/</code> folder in this project's directory.
                        </p>
                        <div className="mt-4 pt-4 border-t border-slate-100">
                          <ul className="text-sm font-mono flex flex-col gap-2">
                            <li className="flex items-center gap-2"><Icon name="file-json" className="h-3.5 w-3.5 text-slate-400"/> ./output/master_index.json</li>
                            <li className="flex items-center gap-2"><Icon name="database" className="h-3.5 w-3.5 text-slate-400"/> ./database/classroom.db</li>
                            <li className="flex items-center gap-2"><Icon name="files" className="h-3.5 w-3.5 text-slate-400"/> ./output/courses/*</li>
                          </ul>
                        </div>
                      </div>

                      <div className="rounded-xl border border-slate-200 bg-white p-6 shadow-sm flex flex-col gap-3 hover:shadow-md transition-shadow">
                        <div className="flex items-center gap-3">
                           <div className="flex h-10 w-10 items-center justify-center rounded-lg bg-emerald-100 text-emerald-600">
                             <Icon name="shield-check" className="h-5 w-5" />
                           </div>
                           <h3 className="font-bold text-slate-800 text-lg">Smart Downloading</h3>
                        </div>
                        <p className="text-sm text-slate-600 leading-relaxed mt-2">
                          The downloader remembers what it has already grabbed. 
                        </p>
                        <p className="text-sm text-slate-600 leading-relaxed">
                          If you restart the downloader, it will automatically skip files it has already saved locally. This saves time and bandwidth!
                        </p>
                      </div>

                      <div className="rounded-xl border border-slate-200 bg-white p-6 shadow-sm flex flex-col gap-3 hover:shadow-md transition-shadow md:col-span-2">
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-3">
                            <div className="flex h-10 w-10 items-center justify-center rounded-lg bg-orange-100 text-orange-600">
                              <Icon name="hard-drive" className="h-5 w-5" />
                            </div>
                            <h3 className="font-bold text-slate-800 text-lg">Recently Downloaded Files</h3>
                          </div>
                          <span className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded">{dbFiles?.filter(f => f.status === 'complete').length || 0} items</span>
                        </div>
                        <div className="mt-4 border rounded-lg bg-slate-50 overflow-hidden">
                          <div className="max-h-[400px] overflow-y-auto w-full text-sm font-mono whitespace-nowrap">
                            <table className="w-full text-left">
                              <thead className="bg-white border-b sticky top-0 shadow-sm z-10">
                                <tr>
                                  <th className="px-4 py-3 font-semibold text-slate-600 w-1/4">Course</th>
                                  <th className="px-4 py-3 font-semibold text-slate-600 w-1/3">File Name</th>
                                  <th className="px-4 py-3 font-semibold text-slate-600">Local Path</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-slate-200">
                                {!dbFiles || dbFiles.filter(f => f.status === 'complete').length === 0 ? (
                                  <tr><td colSpan="3" className="px-4 py-8 text-center text-slate-500 italic bg-white">No files downloaded yet. Start downloading to see them here!</td></tr>
                                ) : dbFiles.filter(f => f.status === 'complete').map(f => (
                                  <tr key={f.id} className="hover:bg-white transition-colors">
                                    <td className="px-4 py-2 text-slate-600 truncate max-w-[200px]" title={f.course_name}>{f.course_name}</td>
                                    <td className="px-4 py-2 font-medium text-slate-800 truncate max-w-[300px]" title={f.filename}>{f.filename}</td>
                                    <td className="px-4 py-2 text-slate-500 truncate max-w-[400px]" title={f.local_path}>{f.local_path}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>

                      <div className="rounded-xl border border-red-200 bg-red-50 p-6 shadow-sm flex flex-col gap-3 md:col-span-2">
                        <div className="flex items-center gap-3">
                           <div className="flex h-10 w-10 items-center justify-center rounded-lg bg-red-100 text-red-600">
                             <Icon name="alert-triangle" className="h-5 w-5" />
                           </div>
                           <h3 className="font-bold text-red-800 text-lg">Danger Zone</h3>
                        </div>
                        <p className="text-sm text-red-700 leading-relaxed mt-2">
                          Need to test the downloader from scratch? You can factory reset the local database. 
                          This deletes the index of what has been downloaded, but it <b>does not</b> delete your actual files on disk.
                        </p>
                        <div className="mt-2">
                          <button onClick={handleResetDatabase} className="flex items-center gap-2 rounded-lg bg-red-600 px-5 py-2.5 font-medium text-white shadow-sm hover:bg-red-700 transition-all active:scale-95">
                            <Icon name="trash-2" className="w-4 h-4"/> Factory Reset Database
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
