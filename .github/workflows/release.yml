name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release checks
        run: npm run release:check

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ contains(github.ref_name, '-rc.') && 'staging' || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
            exit 0
          fi

          if [[ "$TAG_NAME" == *"-rc."* ]]; then
            gh release create "$TAG_NAME" --verify-tag --prerelease --title "$TAG_NAME" --notes-file CHANGELOG.md
          else
            gh release create "$TAG_NAME" --verify-tag --title "$TAG_NAME" --notes-file CHANGELOG.md
          fi
